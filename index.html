<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temurshox Mebel • Premium</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --primary: #0a1428;
      --accent: #ffd700;
      --success: #00c853;
      --danger: #ff1744;
      --card: #1e2a44;
      --text: #e0e7ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2a4a 100%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: rgba(10,20,40,0.95);
      backdrop-filter: blur(10px);
      padding: 1.2rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .header-content {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ffd700, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-buttons button {
      padding: 12px 28px;
      margin: 5px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav-btn.active, .cat-btn.active {
      background: var(--accent);
      color: #0a1428;
      box-shadow: 0 0 20px rgba(255,215,0,0.6);
    }

    .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

    .search-box input {
      width: 100%;
      max-width: 600px;
      padding: 18px 25px;
      border: none;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.1rem;
      margin: 0 auto;
      display: block;
    }
    .search-box input::placeholder { color: #aaa; }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 30px 0;
    }
    .cat-btn {
      padding: 12px 26px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .product-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.4s;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-15px) scale(1.03);
      box-shadow: 0 25px 50px rgba(255,215,0,0.2);
    }

    .product-img {
      height: 240px;
      background: #112233;
      position: relative;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stock {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,200,83,0.9);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .discount-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--danger);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
    }

    .product-info {
      padding: 20px;
    }
    .product-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 10px;
      min-height: 65px;
    }
    .product-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }
    .old-price {
      text-decoration: line-through;
      color: #888;
      font-size: 1.05rem;
    }

    .add-to-cart {
      background: linear-gradient(90deg, #00c853, #64dd17);
      color: white;
      border: none;
      padding: 16px;
      width: 100%;
      margin-top: 15px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .add-to-cart:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,200,83,0.6);
    }

    .cart-toggle, .admin-toggle {
      position: fixed;
      bottom: 30px;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 9999;
      transition: all 0.3s;
    }
    .cart-toggle { right: 30px; background: var(--success); }
    .admin-toggle { left: 30px; background: #ffd700; color: #0a1428; }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--danger);
      color: white;
      font-size: 14px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    footer {
      background: #0a1428;
      text-align: center;
      padding: 40px 20px;
      margin-top: 80px;
      border-top: 1px solid rgba(255,215,0,0.2);
    }

    .admin-panel {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-top: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>🛋️ Temurshox <span style="color:#ffd700;">Mebel</span></h1>
    <div class="nav-buttons">
      <button class="nav-btn active" id="btnProducts">Mahsulotlar</button>
      <button class="nav-btn" id="btnShops">Do'konlar</button>
    </div>
  </div>
</header>

<div class="container">
  <div id="productsSection">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Mahsulot nomini qidiring...">
    </div>
    <div class="categories" id="categories"></div>
    <div class="products" id="products"></div>
  </div>

  <div id="shopsSection" class="hidden">
    <!-- Do'konlar bo'limi (oldingi versiyadan qoldirilgan) -->
    <div class="shops" id="shops"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel" style="display:none;">
    <h2 style="text-align:center; color:#ffd700; margin-bottom:25px;">🔧 Admin Panel</h2>
    <!-- Mahsulot qo'shish va boshqa bo'limlar oldingi versiyadan saqlangan -->
    <!-- Stok qo'shish maydoni quyida -->
    <div style="margin:20px 0; padding:20px; background:#112233; border-radius:15px;">
      <h4 style="margin-bottom:15px;">📦 Mahsulotga stok qo'shish / o'zgartirish</h4>
      <select id="stockProductSelect" style="width:100%; padding:12px; margin-bottom:10px; background:#1e2a44; color:white; border:none; border-radius:10px;"></select>
      <input type="number" id="newStock" placeholder="Yangi mavjud soni" style="width:100%; padding:12px; margin-bottom:10px; background:#1e2a44; color:white; border:none; border-radius:10px;">
      <button onclick="updateStock()" style="width:100%; padding:14px; background:#00c853; color:white; border:none; border-radius:50px; font-weight:700;">Stokni yangilash</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 Temurshox Mebel • Sifat va qulaylik uchrashgan joy</p>
  <a href="tel:+998941281315" style="color:#ffd700; text-decoration:none;">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" id="cartToggle">
  <i class="fas fa-shopping-cart"></i>
  <span class="cart-count" id="cartCount">0</span>
</div>

<button class="admin-toggle" id="adminToggle">🔧</button>

<script>
// ====================== MA'LUMOTLAR ======================
let products = [
  { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", emoji: "🛋️", image: null, stock: 12 },
  { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", emoji: "🛋️", image: null, stock: 8 },
  // ... qolgan 18 ta mahsulotni ham stock bilan qo'shish mumkin (oldingi versiyadan)
  // Men qisqalik uchun faqat 2 tasini ko'rsatdim, qolganlarini oldingi koddan nusxa ko'chirib qo'shing
];

let cart = JSON.parse(localStorage.getItem('cart')) || {};

// ====================== STOCK FUNKSIYALARI ======================
function updateStock() {
  const select = document.getElementById('stockProductSelect');
  const newStock = parseInt(document.getElementById('newStock').value);
  const productId = parseInt(select.value);

  const product = products.find(p => p.id === productId);
  if (product && newStock >= 0) {
    product.stock = newStock;
    localStorage.setItem('products', JSON.stringify(products));
    alert(`✅ ${product.name} uchun stok ${newStock} ga yangilandi!`);
    showProducts();
    updateStockSelect();
  }
}

function updateStockSelect() {
  let html = '';
  products.forEach(p => {
    html += `<option value="${p.id}">${p.name} (hozir: ${p.stock} ta)</option>`;
  });
  document.getElementById('stockProductSelect').innerHTML = html;
}

// ====================== BUYURTMA BERISHDA STOK AYIRISH ======================
function submitOrder() {
  // ... oldingi buyurtma kodi ...

  // Har bir mahsulotdan stokni ayirish
  for (let id in cart) {
    const product = products.find(p => p.id == id);
    if (product) {
      product.stock -= cart[id];
      if (product.stock < 0) product.stock = 0;
    }
  }

  localStorage.setItem('products', JSON.stringify(products));
  // ... qolgan buyurtma yuborish kodi (Telegram) ...
}

// ====================== Mahsulotlarni ko'rsatish (stok bilan) ======================
function showProducts() {
  // ... oldingi kod ...
  // Har bir kartochkaga stok qo'shish:
  // <div class="stock">🟢 ${p.stock} ta mavjud</div>
}

// Admin ochish
document.getElementById('adminToggle').onclick = () => {
  const panel = document.getElementById('adminPanel');
  const pwd = prompt("Admin parolini kiriting:");
  if (pwd === "admin123") {
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    updateStockSelect();
  }
};

// Boshlash
window.onload = () => {
  // loadData() va boshqa funksiyalaringizni chaqiring
  showProducts();
  updateStockSelect();
};
</script>
</body>
</html>
