<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Temurshox Mebel | Premium mebel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
        }

        header h1 span {
            color: #ffd700;
        }

        .container {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .search-box {
            background: white;
            border-radius: 60px;
            padding: 5px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 1rem;
            font-weight: bold;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .shops {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .shop-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-5px);
        }

        .shop-img {
            width: 100%;
            height: 150px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .shop-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shop-info {
            padding: 15px;
        }

        .shop-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .shop-address {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .shop-phone {
            color: #28a745;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .shop-location {
            color: #667eea;
            font-size: 0.8rem;
            margin-top: 5px;
            cursor: pointer;
            text-decoration: underline;
        }

        .view-shop-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        .cart-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 380px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-total {
            padding: 15px;
            border-top: 2px solid #eee;
            font-weight: bold;
            text-align: center;
        }

        .order-form {
            padding: 15px;
            background: #f8f9fa;
            margin: 15px;
            border-radius: 15px;
        }

        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .submit-order {
            background: #28a745;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            background: #0f2027;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        .call-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 10px;
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2c3e50;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 200;
            border: none;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }

        .admin-panel input, .admin-panel select, .admin-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .admin-panel button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-section {
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .admin-section h4 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .image-preview {
            margin: 10px 0;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.3rem; }
            .nav-btn { padding: 8px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛋️ Temurshox <span>Mebel</span></h1>
    <p>✨ Sifat va qulaylik uchrashgan joy ✨</p>
</header>

<div class="container">
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showSection('products')">🛍️ Mahsulotlar</button>
        <button class="nav-btn" onclick="showSection('shops')">🏪 Do'konlar</button>
    </div>

    <div id="productsSection">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish..." onkeyup="showProducts()">
        </div>
        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <div id="shopsSection" class="hidden">
        <div class="search-box">
            <input type="text" id="shopSearchInput" placeholder="🔍 Do'kon qidirish..." onkeyup="showShops()">
        </div>
        <div class="shops" id="shops"></div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>🔧 Admin Panel</h3>
        
        <div class="admin-section">
            <h4>📂 Yangi kategoriya</h4>
            <input type="text" id="newCatName" placeholder="Kategoriya nomi">
            <input type="text" id="newCatEmoji" placeholder="Emoji (🛋️)">
            <button onclick="addCategory()">➕ Kategoriya qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>🛍️ Yangi mahsulot (RASM bilan)</h4>
            <input type="text" id="prodName" placeholder="Mahsulot nomi">
            <input type="number" id="prodPrice" placeholder="Narxi (so'm)">
            <input type="number" id="prodOldPrice" placeholder="Eski narxi">
            <select id="prodCategory"></select>
            <input type="text" id="prodEmoji" placeholder="Emoji (agar rasm bo'lmasa)">
            <input type="file" id="prodImage" accept="image/*" onchange="previewProductImage(this)">
            <div class="image-preview" id="prodImagePreview"></div>
            <button onclick="addProduct()">➕ Mahsulot qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>🏪 Yangi do'kon (JOYLASHUV bilan)</h4>
            <input type="text" id="shopName" placeholder="Do'kon nomi">
            <input type="text" id="shopAddress" placeholder="Manzil">
            <input type="text" id="shopPhone" placeholder="Telefon">
            <input type="text" id="shopLocation" placeholder="Google Maps linki">
            <textarea id="shopDesc" rows="2" placeholder="Tavsif"></textarea>
            <input type="file" id="shopImage" accept="image/*" onchange="previewShopImage(this)">
            <div class="image-preview" id="shopImagePreview"></div>
            <button onclick="addShop()">🏪 Do'kon qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>📋 Mahsulotlar</h4>
            <div id="productList"></div>
        </div>

        <div class="admin-section">
            <h4>🏪 Do'konlar</h4>
            <div id="shopList"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Temurshox Mebel</p>
    <a href="tel:+998941281315" class="call-btn">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Savatcha</h3>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Jami: 0 so'm</div>
    <div class="order-form">
        <input type="text" id="fullName" placeholder="Ism Familiya *">
        <textarea id="address" rows="2" placeholder="Manzil *"></textarea>
        <input type="tel" id="phone" placeholder="Telefon *">
        <textarea id="notes" rows="2" placeholder="Izoh"></textarea>
        <button class="submit-order" onclick="submitOrder()">✅ Buyurtma berish</button>
    </div>
</div>

<button class="admin-toggle" onclick="toggleAdmin()">🔧</button>

<script>
    // ============ MA'LUMOTLAR ============
    let categories = [
        { id: "divan", name: "Divanlar", emoji: "🛋️" },
        { id: "stol", name: "Stollar", emoji: "💻" },
        { id: "shkaf", name: "Shkaflar", emoji: "🚪" },
        { id: "kreslo", name: "Kreslolar", emoji: "🪑" }
    ];

    let products = [
        { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", emoji: "🛋️", image: null },
        { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", emoji: "🪑", image: null },
        { id: 3, name: "Kompyuter stoli", price: 850000, oldPrice: null, category: "stol", emoji: "💻", image: null },
        { id: 4, name: "Garderob shkafi", price: 2800000, oldPrice: 3200000, category: "shkaf", emoji: "🚪", image: null },
        { id: 5, name: "Kompyuter kreslosi", price: 1100000, oldPrice: null, category: "kreslo", emoji: "🪑", image: null }
    ];

    let shops = [
        { id: 1, name: "Temurshox Mebel - Chilonzor", address: "Chilonzor tumani, 3-kvartal", phone: "+998 97 935 13 15", location: "https://maps.google.com/?q=41.285,69.205", desc: "Markaziy filial", image: null },
        { id: 2, name: "Temurshox Mebel - Sergeli", address: "Sergeli tumani, Yangi hayot", phone: "+998 93 346 86 32", location: "https://maps.google.com/?q=41.234,69.189", desc: "Yangi filial", image: null }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let currentCat = "all";
    let selectedProductImage = null;
    let selectedShopImage = null;

    // ============ SAQLASH ============
    function saveData() {
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('shops', JSON.stringify(shops));
        localStorage.setItem('categories', JSON.stringify(categories));
    }

    function loadData() {
        let p = localStorage.getItem('products');
        let s = localStorage.getItem('shops');
        let c = localStorage.getItem('categories');
        if (p) products = JSON.parse(p);
        if (s) shops = JSON.parse(s);
        if (c) categories = JSON.parse(c);
        updateCatSelect();
        showCategories();
        showProducts();
        showShops();
        updateAdminLists();
        updateCart();
    }

    // ============ KATEGORIYALAR ============
    function showCategories() {
        let container = document.getElementById('categories');
        if (!container) return;
        let html = '<button class="cat-btn active" data-cat="all" onclick="filterProducts(\'all\')">🏠 Barchasi</button>';
        for (let i = 0; i < categories.length; i++) {
            html += `<button class="cat-btn" data-cat="${categories[i].id}" onclick="filterProducts('${categories[i].id}')">${categories[i].emoji} ${categories[i].name}</button>`;
        }
        html += '<button class="cat-btn" data-cat="discount" onclick="filterProducts(\'discount\')">🔥 Chegirmali</button>';
        container.innerHTML = html;
    }

    function updateCatSelect() {
        let select = document.getElementById('prodCategory');
        if (!select) return;
        let html = '';
        for (let i = 0; i < categories.length; i++) {
            html += `<option value="${categories[i].id}">${categories[i].emoji} ${categories[i].name}</option>`;
        }
        select.innerHTML = html;
    }

    function addCategory() {
        let name = document.getElementById('newCatName').value.trim();
        let emoji = document.getElementById('newCatEmoji').value.trim() || "📁";
        if (!name) { alert("❌ Kategoriya nomini yozing!"); return; }
        let id = name.toLowerCase().replace(/ /g, '_');
        categories.push({ id: id, name: name, emoji: emoji });
        saveData();
        showCategories();
        updateCatSelect();
        document.getElementById('newCatName').value = '';
        document.getElementById('newCatEmoji').value = '';
        alert("✅ Kategoriya qo'shildi!");
    }

    // ============ MAHSULOTLAR ============
    function previewProductImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                selectedProductImage = e.target.result;
                let preview = document.getElementById('prodImagePreview');
                if (preview) preview.innerHTML = '<img src="' + selectedProductImage + '">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showProducts() {
        let filtered = [];
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            let match = false;
            if (currentCat === "all") match = true;
            else if (currentCat === "discount") match = (p.oldPrice && p.oldPrice > p.price);
            else match = (p.category === currentCat);
            
            if (match) filtered.push(p);
        }
        
        let search = document.getElementById('searchInput').value.toLowerCase();
        if (search) {
            let searchFiltered = [];
            for (let i = 0; i < filtered.length; i++) {
                if (filtered[i].name.toLowerCase().includes(search)) searchFiltered.push(filtered[i]);
            }
            filtered = searchFiltered;
        }
        
        let container = document.getElementById('products');
        if (!container) return;
        
        if (filtered.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:50px;">🔍 Hech narsa topilmadi</p>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            let p = filtered[i];
            let discountHtml = '';
            if (p.oldPrice && p.oldPrice > p.price) {
                let percent = Math.round((1 - p.price / p.oldPrice) * 100);
                discountHtml = '<div style="position:absolute;top:10px;right:10px;background:#ff4757;color:white;padding:4px 12px;border-radius:20px;font-size:12px;">-' + percent + '%</div>';
            }
            html += `
                <div class="product-card">
                    <div class="product-img" style="position:relative;">
                        ${discountHtml}
                        ${p.image ? '<img src="' + p.image + '">' : '<span style="font-size:3rem;">' + p.emoji + '</span>'}
                    </div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">
                            ${formatPrice(p.price)} so'm
                            ${p.oldPrice ? '<span class="old-price">' + formatPrice(p.oldPrice) + ' so'm</span>' : ''}
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">🛒 Savatga qo'shish</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function filterProducts(cat) {
        currentCat = cat;
        let btns = document.querySelectorAll('.cat-btn');
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove('active');
            if (btns[i].getAttribute('data-cat') === cat) {
                btns[i].classList.add('active');
            }
        }
        showProducts();
    }

    function addProduct() {
        let name = document.getElementById('prodName').value.trim();
        let price = parseInt(document.getElementById('prodPrice').value);
        if (!name || !price) { alert("❌ Nom va narxni yozing!"); return; }
        
        let newId = 1;
        for (let i = 0; i < products.length; i++) {
            if (products[i].id >= newId) newId = products[i].id + 1;
        }
        
        let oldPrice = document.getElementById('prodOldPrice').value;
        let oldPriceVal = (oldPrice && parseInt(oldPrice)) ? parseInt(oldPrice) : null;
        
        products.push({
            id: newId,
            name: name,
            price: price,
            oldPrice: oldPriceVal,
            category: document.getElementById('prodCategory').value,
            emoji: document.getElementById('prodEmoji').value.trim() || "📦",
            image: selectedProductImage
        });
        saveData();
        showProducts();
        updateAdminLists();
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodOldPrice').value = '';
        document.getElementById('prodEmoji').value = '';
        document.getElementById('prodImage').value = '';
        document.getElementById('prodImagePreview').innerHTML = '';
        selectedProductImage = null;
        
        alert("✅ Mahsulot qo'shildi!");
    }

    function deleteProduct(id) {
        if (confirm("O'chirilsinmi?")) {
            let newProducts = [];
            for (let i = 0; i < products.length; i++) {
                if (products[i].id !== id) newProducts.push(products[i]);
            }
            products = newProducts;
            saveData();
            showProducts();
            updateAdminLists();
        }
    }

    // ============ DO'KONLAR ============
    function previewShopImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                selectedShopImage = e.target.result;
                let preview = document.getElementById('shopImagePreview');
                if (preview) preview.innerHTML = '<img src="' + selectedShopImage + '">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showShops() {
        let filtered = [];
        for (let i = 0; i < shops.length; i++) {
            filtered.push(shops[i]);
        }
        
        let search = document.getElementById('shopSearchInput').value.toLowerCase();
        if (search) {
            let searchFiltered = [];
            for (let i = 0; i < filtered.length; i++) {
                if (filtered[i].name.toLowerCase().includes(search) || filtered[i].address.toLowerCase().includes(search)) {
                    searchFiltered.push(filtered[i]);
                }
            }
            filtered = searchFiltered;
        }
        
        let container = document.getElementById('shops');
        if (!container) return;
        
        if (filtered.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:50px;">🏪 Hech qanday do\'kon topilmadi</p>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            let s = filtered[i];
            html += `
                <div class="shop-card">
                    <div class="shop-img">
                        ${s.image ? '<img src="' + s.image + '">' : '<span style="font-size:3rem;">🏪</span>'}
                    </div>
                    <div class="shop-info">
                        <div class="shop-name">${s.name}</div>
                        <div class="shop-address">📍 ${s.address}</div>
                        <div class="shop-phone">📞 ${s.phone}</div>
                        ${s.location ? '<div class="shop-location" onclick="openLocation(\'' + s.location + '\')">🗺️ Xaritada ko\'rish</div>' : ''}
                        <button class="view-shop-btn" onclick="viewShop(${s.id})">🔍 Batafsil</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function viewShop(id) {
        let s = null;
        for (let i = 0; i < shops.length; i++) {
            if (shops[i].id === id) s = shops[i];
        }
        if (s) {
            let msg = "🏪 " + s.name + "\n\n📍 " + s.address + "\n📞 " + s.phone + "\n📝 " + (s.desc || 'Ma\'lumot yo\'q');
            alert(msg);
            if (s.location) openLocation(s.location);
        }
    }

    function openLocation(location) {
        window.open(location, '_blank');
    }

    function addShop() {
        let name = document.getElementById('shopName').value.trim();
        let address = document.getElementById('shopAddress').value.trim();
        let phone = document.getElementById('shopPhone').value.trim();
        if (!name || !address || !phone) { alert("❌ Do'kon nomi, manzil va telefonni to'ldiring!"); return; }
        
        let newId = 1;
        for (let i = 0; i < shops.length; i++) {
            if (shops[i].id >= newId) newId = shops[i].id + 1;
        }
        
        shops.push({
            id: newId,
            name: name,
            address: address,
            phone: phone,
            location: document.getElementById('shopLocation').value.trim(),
            desc: document.getElementById('shopDesc').value.trim(),
            image: selectedShopImage
        });
        saveData();
        showShops();
        updateAdminLists();
        
        document.getElementById('shopName').value = '';
        document.getElementById('shopAddress').value = '';
        document.getElementById('shopPhone').value = '';
        document.getElementById('shopLocation').value = '';
        document.getElementById('shopDesc').value = '';
        document.getElementById('shopImage').value = '';
        document.getElementById('shopImagePreview').innerHTML = '';
        selectedShopImage = null;
        
        alert("✅ Do'kon qo'shildi!");
    }

    function deleteShop(id) {
        if (confirm("Do'kon o'chirilsinmi?")) {
            let newShops = [];
            for (let i = 0; i < shops.length; i++) {
                if (shops[i].id !== id) newShops.push(shops[i]);
            }
            shops = newShops;
            saveData();
            showShops();
            updateAdminLists();
        }
    }

    // ============ SAVAT ============
    function addToCart(id) {
        if (cart[id]) cart[id] = cart[id] + 1;
        else cart[id] = 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
        alert("✅ Savatga qo'shildi!");
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        let html = '';
        
        for (let id in cart) {
            let p = null;
            for (let i = 0; i < products.length; i++) {
                if (products[i].id == id) p = products[i];
            }
            if (p) {
                let subtotal = p.price * cart[id];
                total += subtotal;
                count += cart[id];
                html += '<div class="cart-item"><div><strong>' + p.name + '</strong> x' + cart[id] + '</div><div>' + formatPrice(subtotal) + ' so'm</div></div>';
            }
        }
        
        let cartItems = document.getElementById('cartItems');
        if (cartItems) cartItems.innerHTML = html || '<div style="text-align:center;padding:30px;">🛒 Savat bo\'sh</div>';
        
        let cartTotal = document.getElementById('cartTotal');
        if (cartTotal) cartTotal.innerHTML = 'Jami: ' + formatPrice(total) + ' so\'m';
        
        let cartCount = document.getElementById('cartCount');
        if (cartCount) cartCount.innerHTML = count;
    }

    function toggleCart() {
        let sidebar = document.getElementById('cartSidebar');
        if (sidebar) sidebar.classList.toggle('open');
    }
