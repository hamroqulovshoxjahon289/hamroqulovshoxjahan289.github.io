<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temurshox Mebel - Premium Furniture Store</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4AF37;--gold-dark:#A68844;--gold-light:#F5D547;
  --pr:#1B1B2F;--pr2:#2D2D44;--pr3:#3D3D5C;
  --bg:#0F0F15;--surf:#1A1A24;--surf2:#242430;
  --txt:#F5F5F5;--txt2:#D0D0D0;--txt3:#909090;
  --brd:#333340;--brd2:#404050;
  --red:#DC2626;--green:#16A34A;--green2:#22C55E;
  --radius:16px;--radius-sm:12px;
  --shadow:0 8px 32px rgba(212,175,55,.15);
  --shadow-sm:0 4px 12px rgba(212,175,55,.08);
}

[data-theme="light"]{
  --pr:#F8F6F1;--pr2:#FDFBF7;--pr3:#F5EFE7;
  --bg:#FFFAF5;--surf:#FFFFFF;--surf2:#FBF8F3;
  --txt:#1A1A1A;--txt2:#4A4A4A;--txt3:#7A7A7A;
  --brd:#E8DFD5;--brd2:#D4C8BC;
  --shadow:0 8px 32px rgba(212,175,55,.12);
  --shadow-sm:0 4px 12px rgba(212,175,55,.06);
}

html{scroll-behavior:smooth}
body{font-family:'Georgia','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);transition:background .4s,color .4s;min-height:100vh}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* GOLDEN GRADIENT ACCENTS */
.gold-gradient{background:linear-gradient(135deg,#D4AF37,#F5D547);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gold-accent{background:linear-gradient(135deg,#D4AF37,#F5D547);box-shadow:0 0 20px rgba(212,175,55,.3)}

/* TOPBAR */
.topbar{background:linear-gradient(90deg,#D4AF37,#F5D547,#D4AF37);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
.topbar-txt{color:#1a1a1a;font-size:12px;font-weight:700;letter-spacing:1px}
.topbar-right{display:flex;gap:16px;align-items:center}
.topbar-link{color:#1a1a1a;font-size:11px;text-decoration:none;transition:.2s;font-weight:600}
.topbar-link:hover{text-decoration:underline;transform:scale(1.05)}

/* HEADER */
.hdr{background:var(--surf);border-bottom:2px solid var(--gold);padding:0 20px;box-shadow:var(--shadow)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:80px;gap:20px;max-width:1600px;margin:0 auto}
.logo{display:flex;align-items:center;gap:16px;text-decoration:none;flex-shrink:0}
.logo-img{width:65px;height:65px;border-radius:50%;object-fit:contain;background:linear-gradient(135deg,var(--surf2),transparent);padding:4px;box-shadow:0 0 20px rgba(212,175,55,.3)}
.logo-words{display:flex;flex-direction:column}
.logo-words strong{font-size:20px;font-weight:900;background:linear-gradient(135deg,#D4AF37,#F5D547);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.5px;line-height:1}
.logo-words span{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.hdr-search{flex:1;max-width:420px;position:relative}
.hdr-search input{width:100%;padding:11px 16px 11px 42px;border:2px solid var(--brd);border-radius:30px;font-size:13px;background:var(--bg);color:var(--txt);outline:none;transition:all .2s;font-family:inherit}
.hdr-search input::placeholder{color:var(--txt3)}
.hdr-search input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.2);background:var(--surf2)}
.hdr-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);width:16px;height:16px}

.hdr-actions{display:flex;gap:12px;align-items:center}
.theme-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);transition:all .3s;box-shadow:var(--shadow-sm)}
.theme-btn:hover{background:var(--gold);color:#1a1a1a;transform:rotate(25deg);box-shadow:var(--shadow)}

.lang-sel{padding:8px 14px;border:2px solid var(--gold);border-radius:25px;font-size:12px;font-weight:700;background:var(--surf2);color:var(--gold);outline:none;cursor:pointer;transition:all .2s}
.lang-sel:hover{background:var(--gold);color:#1a1a1a}

.cart-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;padding:10px 18px;border-radius:30px;border:none;font-size:13px;font-weight:900;cursor:pointer;position:relative;transition:all .3s;box-shadow:var(--shadow);letter-spacing:.5px}
.cart-btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(212,175,55,.25)}
.cart-badge{background:var(--red);color:#fff;font-size:10px;font-weight:900;min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{transform:scale(1.2);box-shadow:0 0 0 8px rgba(220,38,38,0)}}

.adm-btn{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gold);transition:all .3s;box-shadow:var(--shadow-sm)}
.adm-btn:hover{background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;border-color:#EC4899;transform:scale(1.15);box-shadow:var(--shadow)}

/* HERO */
.hero{background:linear-gradient(135deg,#1B1B2F 0%,#2D2D44 50%,#1a1a1a 100%);padding:50px 20px 60px;position:relative;overflow:hidden;border-bottom:3px solid var(--gold)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(212,175,55,.08),transparent 50%),radial-gradient(circle at 80% -20%,rgba(212,175,55,.08),transparent 50%);pointer-events:none}
.hero-circles{position:absolute;inset:0;pointer-events:none}
.hc{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.06),transparent 70%);animation:float 8s ease-in-out infinite}
.hc1{width:400px;height:400px;right:-100px;top:-100px;animation-delay:0s}
.hc2{width:250px;height:250px;left:-50px;bottom:-80px;animation-delay:2s}
.hc3{width:150px;height:150px;right:25%;top:15%;animation-delay:1s}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(25px)}}

.hero-inner{position:relative;z-index:1;max-width:1400px;margin:0 auto}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(212,175,55,.15);border:2px solid var(--gold);color:var(--gold);font-size:12px;font-weight:900;padding:8px 16px;border-radius:30px;letter-spacing:1px;margin-bottom:16px;backdrop-filter:blur(10px);text-transform:uppercase}
.hero h2{color:#fff;font-size:48px;font-weight:900;line-height:1.1;margin-bottom:14px;max-width:580px;text-shadow:0 4px 20px rgba(0,0,0,.5);letter-spacing:-1px}
.hero h2 em{color:var(--gold-light);font-style:normal;background:linear-gradient(135deg,#D4AF37,#F5D547);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:rgba(255,255,255,.75);font-size:15px;max-width:500px;line-height:1.8;margin-bottom:28px;font-weight:500}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px}
.btn-gold{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;padding:13px 28px;border-radius:30px;border:none;font-weight:900;font-size:13px;cursor:pointer;transition:all .3s;box-shadow:var(--shadow);letter-spacing:.5px;text-transform:uppercase}
.btn-gold:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(212,175,55,.3)}
.btn-wh{background:rgba(255,255,255,.08);border:2px solid var(--gold);color:var(--gold);padding:13px 28px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);letter-spacing:.5px;text-transform:uppercase}
.btn-wh:hover{background:rgba(212,175,55,.1);transform:translateY(-2px)}

.hero-stats{display:flex;gap:32px;flex-wrap:wrap;margin-top:40px}
.stat{text-align:left}
.stat-n{color:var(--gold-light);font-size:32px;font-weight:900;line-height:1;display:block}
.stat-l{color:rgba(255,255,255,.6);font-size:12px;margin-top:6px;letter-spacing:1px;text-transform:uppercase;font-weight:600}

/* PROMO STRIP */
.promo-strip{background:linear-gradient(90deg,#D4AF37,#F5D547,#D4AF37);padding:14px 20px;overflow:hidden;box-shadow:var(--shadow)}
.promo-inner{display:flex;gap:50px;align-items:center;white-space:nowrap;animation:marquee 25s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.promo-item{font-size:13px;font-weight:900;color:#1a1a1a;display:flex;align-items:center;gap:8px;flex-shrink:0;letter-spacing:.5px}
.promo-dot{width:6px;height:6px;background:#1a1a1a;border-radius:50%;flex-shrink:0}

/* TABS */
.tabs{background:var(--surf);border-bottom:2px solid var(--brd);padding:0 20px;display:flex;gap:0;position:sticky;top:0;z-index:90}
.tab{padding:16px 24px;font-size:14px;font-weight:700;color:var(--txt3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase;font-size:13px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--gold)}

/* TOOLBAR */
.toolbar{background:var(--surf);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--brd)}
.cats-bar{padding:14px 20px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
.cats-bar::-webkit-scrollbar{display:none}
.cat{padding:9px 18px;border-radius:25px;border:2px solid var(--brd);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;background:var(--surf2);color:var(--txt2);letter-spacing:.3px;text-transform:uppercase}
.cat.active,.cat:hover{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;border-color:var(--gold);transform:scale(1.08)}
.sort-sel{padding:9px 14px;border:2px solid var(--brd);border-radius:25px;font-size:12px;font-weight:700;background:var(--surf2);color:var(--txt);outline:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.3px}
.sort-sel:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.15)}

/* SECTION */
.section{padding:24px 20px;max-width:1600px;margin:0 auto}
.sec-title{font-size:18px;font-weight:900;color:var(--txt);margin-bottom:18px;display:flex;align-items:center;gap:12px;letter-spacing:.5px;text-transform:uppercase}
.sec-title::before{content:'';width:5px;height:24px;background:linear-gradient(180deg,#D4AF37,#F5D547);border-radius:4px;box-shadow:0 0 10px rgba(212,175,55,.3)}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}

/* PRODUCT CARD */
.pcard{background:var(--surf);border-radius:var(--radius);overflow:hidden;border:2px solid var(--brd);cursor:pointer;transition:all .3s;position:relative;animation:fadeUp .4s both;box-shadow:var(--shadow-sm)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pcard:hover{transform:translateY(-8px);border-color:var(--gold);box-shadow:var(--shadow)}
.pcard-img{height:160px;background:linear-gradient(135deg,var(--surf2),var(--bg));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:60px}
.pcard-img img{width:100%;height:100%;object-fit:cover}
.dbadge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;font-size:11px;font-weight:900;padding:5px 10px;border-radius:20px;animation:slideIn .3s ease-out;letter-spacing:.3px}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.nbadge{position:absolute;top:10px;left:10px;background:var(--green);color:#fff;font-size:10px;font-weight:900;padding:4px 8px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase}
.pcard-body{padding:14px}
.pcard-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:6px;line-height:1.4}
.pcard-stock{font-size:11px;color:var(--txt3);margin-bottom:8px;display:flex;align-items:center;gap:5px;font-weight:600;text-transform:uppercase}
.stock-dot{width:8px;height:8px;background:var(--green2);border-radius:50%;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.stock-dot.low{background:#f59e0b}
.stock-dot.out{background:var(--red)}
.pcard-price{font-size:16px;font-weight:900;color:var(--gold)}
.pcard-old{font-size:12px;color:var(--txt3);text-decoration:line-through;margin-left:6px}
.pcard-add{width:100%;margin-top:12px;padding:11px;background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:900;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:var(--shadow-sm);letter-spacing:.3px;text-transform:uppercase}
.pcard-add:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.pcard-add.ok{background:linear-gradient(135deg,var(--green),var(--green2))}

/* SHOP CARD */
.shop-card{background:var(--surf);border-radius:var(--radius);overflow:hidden;border:2px solid var(--brd);transition:all .3s;animation:fadeUp .4s both;box-shadow:var(--shadow-sm)}
.shop-card:hover{transform:translateY(-8px);border-color:var(--gold);box-shadow:var(--shadow)}
.shop-card-hdr{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;padding:18px;display:flex;align-items:center;gap:12px}
.shop-card-icon{font-size:32px}
.shop-card-name{font-weight:900;font-size:15px;letter-spacing:.5px}
.shop-card-body{padding:16px}
.shop-info{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;font-size:12px;color:var(--txt2);font-weight:600}
.shop-info svg{width:16px;height:16px;flex-shrink:0;margin-top:3px;color:var(--gold)}
.shop-btn{width:100%;padding:11px;margin-bottom:10px;border:none;border-radius:var(--radius-sm);font-weight:900;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.3px;text-transform:uppercase}
.btn-map{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;box-shadow:var(--shadow-sm)}
.btn-map:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.btn-taxi{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:900;box-shadow:var(--shadow-sm)}
.btn-taxi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,.3)}
.btn-call{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:var(--shadow-sm)}
.btn-call:hover{transform:translateY(-2px);box-shadow:var(--shadow)}

/* MAP MODAL */
.map-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;z-index:999;opacity:0;transition:opacity .3s;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.map-modal.on{display:flex;opacity:1}
.map-container{background:var(--surf);border-radius:var(--radius);width:90%;max-width:1000px;height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);border:2px solid var(--gold);animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.map-hdr{display:flex;justify-content:space-between;align-items:center;padding:18px;border-bottom:2px solid var(--gold);background:linear-gradient(135deg,var(--surf2),var(--bg))}
.map-hdr h2{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.map-close{width:40px;height:40px;border:2px solid var(--gold);background:transparent;border-radius:50%;cursor:pointer;font-size:20px;color:var(--gold);transition:all .2s;display:flex;align-items:center;justify-content:center;font-weight:900}
.map-close:hover{background:var(--red);border-color:var(--red);color:#fff}
#shopMap{width:100%;height:100%;border-radius:0 0 12px 12px}

/* ADMIN MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;z-index:999;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
.modal-bg.on{display:flex;opacity:1}
.modal{background:var(--surf);border-radius:var(--radius);width:90%;max-width:1200px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;animation:slideUp .3s ease-out;border:2px solid var(--gold)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:2px solid var(--gold);background:linear-gradient(135deg,var(--surf2),var(--bg));position:sticky;top:0}
.modal-hdr h2{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.modal-close{width:40px;height:40px;border:2px solid var(--gold);background:transparent;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--gold);transition:all .2s;font-weight:900}
.modal-close:hover{background:var(--red);border-color:var(--red);color:#fff}
.modal-body{padding:24px}
.admin-tabs{display:flex;gap:10px;margin-bottom:24px;border-bottom:2px solid var(--brd);padding-bottom:0;overflow-x:auto;flex-wrap:wrap}
.admin-tab{padding:12px 20px;font-size:12px;font-weight:900;cursor:pointer;border:none;background:none;color:var(--txt3);border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-tab:hover{color:var(--gold)}

.admin-section{display:none}
.admin-section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:900;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 14px;border:2px solid var(--brd);border-radius:var(--radius-sm);background:var(--bg);color:var(--txt);font-family:inherit;font-size:13px;transition:all .2s;font-weight:600}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--txt3)}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.15);background:var(--surf2)}
.form-group textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}

.gps-btn-group{display:flex;gap:10px;margin-bottom:16px}
.gps-btn{flex:1;padding:11px;background:linear-gradient(135deg,#00BCD4,#0288D1);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:900;cursor:pointer;transition:all .2s;letter-spacing:.3px;text-transform:uppercase;font-size:12px}
.gps-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.gps-btn:disabled{opacity:.5;cursor:not-allowed}
.gps-status{font-size:11px;color:var(--txt3);margin-top:8px;font-weight:600}
.gps-status.success{color:var(--green)}
.gps-status.error{color:var(--red)}

.btn-submit{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;padding:12px 28px;border-radius:30px;border:none;font-weight:900;font-size:13px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);letter-spacing:.5px;text-transform:uppercase}
.btn-submit:hover{transform:translateY(-2px);box-shadow:var(--shadow)}

.a-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:12px;border-left:4px solid var(--gold)}
.a-list-nm{flex:1;font-size:13px;font-weight:700;color:var(--txt);margin-left:12px}
.a-list-item .del{padding:7px 14px;font-size:11px;background:var(--red);color:#fff;border:none;border-radius:20px;cursor:pointer;transition:all .2s;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.a-list-item .del:hover{background:#991b1b;transform:scale(1.05)}

.stock-opts{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stock-opt{padding:9px 16px;border-radius:20px;border:2px solid var(--brd);background:var(--bg);cursor:pointer;font-size:11px;font-weight:900;transition:all .2s;letter-spacing:.3px;text-transform:uppercase}
.stock-opt.sel{background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;border-color:var(--gold)}

.preview-img{max-width:140px;max-height:140px;border-radius:var(--radius-sm);margin-top:10px;display:none;border:2px solid var(--gold);box-shadow:0 0 10px rgba(212,175,55,.2)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.05));padding:18px;border-radius:var(--radius);border:2px solid var(--brd);text-align:center;box-shadow:var(--shadow-sm)}
.stat-card:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.stat-card .num{font-size:28px;font-weight:900;color:var(--gold);display:block;letter-spacing:-1px}
.stat-card .lab{font-size:11px;color:var(--txt3);margin-top:6px;text-transform:uppercase;letter-spacing:1px;font-weight:700}

/* CART DRAWER */
.cart-bg,.cart-drawer{position:fixed;z-index:99}
.cart-bg{inset:0;background:rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
.cart-bg.on{display:block;opacity:1}
.cart-drawer{right:-480px;top:0;width:480px;height:100vh;background:var(--surf);box-shadow:-8px 0 32px rgba(0,0,0,.3);transition:right .3s;overflow-y:auto;border-left:3px solid var(--gold)}
.cart-drawer.on{right:0}
@media(max-width:600px){.cart-drawer{width:100%;right:-100%}}
.cart-hdr{padding:18px;border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--surf2),var(--bg));position:sticky;top:0}
.cart-hdr h3{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.cart-cls{width:36px;height:36px;border:2px solid var(--gold);background:transparent;border-radius:50%;cursor:pointer;font-size:18px;color:var(--gold);transition:all .2s;display:flex;align-items:center;justify-content:center;font-weight:900}
.cart-cls:hover{background:var(--red);border-color:var(--red);color:#fff}
.cart-body{padding:18px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:12px;border-left:3px solid var(--gold)}
.cart-item-name{font-size:12px;font-weight:700;color:var(--txt);flex:1}
.cart-item-qty{display:flex;gap:5px;align-items:center}
.qty-btn{width:24px;height:24px;background:linear-gradient(135deg,#D4AF37,#F5D547);color:#1a1a1a;border:none;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s;font-weight:900}
.qty-btn:hover{transform:scale(1.1);box-shadow:var(--shadow-sm)}
.cart-item-total{font-weight:900;color:var(--gold);font-size:13px;letter-spacing:.3px}
.cart-empty{text-align:center;padding:40px;color:var(--txt3);font-size:14px;font-weight:600}
.cart-total{padding:18px;border-top:2px solid var(--gold);font-size:14px;font-weight:900;color:var(--txt);letter-spacing:.5px;text-transform:uppercase}
.cart-total .amt{color:var(--gold);font-size:20px;float:right;letter-spacing:-1px}
