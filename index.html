<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Temurshox Mebel | Premium mebel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
        }

        header h1 span {
            color: #ffd700;
        }

        .container {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Navigatsiya tugmalari */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        /* Qidiruv */
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 5px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        /* Kategoriya tugmalari */
        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Mahsulotlar grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 1rem;
            font-weight: bold;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Do'konlar grid */
        .shops {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .shop-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-5px);
        }

        .shop-img {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .shop-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shop-info {
            padding: 15px;
        }

        .shop-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .shop-address {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .shop-phone {
            color: #28a745;
            font-weight: bold;
        }

        .view-shop-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Savat */
        .cart-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 380px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-qty {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cart-item-qty button {
            background: #f0f0f0;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-total {
            padding: 15px;
            border-top: 2px solid #eee;
            font-weight: bold;
            text-align: center;
        }

        .order-form {
            padding: 15px;
            background: #f8f9fa;
            margin: 15px;
            border-radius: 15px;
        }

        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .submit-order {
            background: #28a745;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            background: #0f2027;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        .call-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 10px;
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2c3e50;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 200;
            border: none;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }

        .admin-panel input, .admin-panel select, .admin-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .admin-panel button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-section {
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .admin-section h4 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .image-preview {
            margin: 10px 0;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.3rem; }
            .nav-btn { padding: 8px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛋️ Temurshox <span>Mebel</span></h1>
    <p>✨ Sifat va qulaylik uchrashgan joy ✨</p>
</header>

<div class="container">
    <!-- Navigatsiya -->
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showSection('products')">🛍️ Mahsulotlar</button>
        <button class="nav-btn" onclick="showSection('shops')">🏪 Do'konlar</button>
    </div>

    <!-- Mahsulotlar bo'limi -->
    <div id="productsSection">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish...">
        </div>

        <div class="categories" id="categories"></div>

        <div class="products" id="products"></div>
    </div>

    <!-- Do'konlar bo'limi -->
    <div id="shopsSection" class="hidden">
        <div class="search-box">
            <input type="text" id="shopSearchInput" placeholder="🔍 Do'kon qidirish...">
        </div>
        <div class="shops" id="shops"></div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>🔧 Admin Panel</h3>
        
        <!-- Kategoriya qo'shish -->
        <div class="admin-section">
            <h4>📂 Yangi kategoriya qo'shish</h4>
            <input type="text" id="newCategoryName" placeholder="Kategoriya nomi (masalan: Oshxona)">
            <input type="text" id="newCategoryEmoji" placeholder="Emoji (masalan: 🍽️)">
            <button onclick="addCategory()">➕ Kategoriya qo'shish</button>
        </div>

        <!-- Mahsulot qo'shish -->
        <div class="admin-section">
            <h4>🛍️ Yangi mahsulot qo'shish</h4>
            <input type="text" id="productName" placeholder="Mahsulot nomi">
            <input type="number" id="productPrice" placeholder="Narxi (so'm)">
            <input type="number" id="productOldPrice" placeholder="Eski narxi (ixtiyoriy)">
            <select id="productCategory"></select>
            <input type="number" id="productRating" placeholder="Reyting (1-5)" value="5">
            <input type="text" id="productEmoji" placeholder="Emoji">
            <div style="margin: 10px 0;">
                <label>🖼️ Rasm:</label>
                <input type="file" id="productImageFile" accept="image/*" onchange="previewProductImage(this)">
                <div class="image-preview" id="productImagePreview"></div>
            </div>
            <button onclick="addProduct()">➕ Mahsulot qo'shish</button>
        </div>

        <!-- Do'kon qo'shish -->
        <div class="admin-section">
            <h4>🏪 Yangi do'kon qo'shish</h4>
            <input type="text" id="shopName" placeholder="Do'kon nomi">
            <input type="text" id="shopAddress" placeholder="Manzili">
            <input type="text" id="shopPhone" placeholder="Telefon raqami">
            <textarea id="shopDesc" rows="2" placeholder="Tavsifi"></textarea>
            <div style="margin: 10px 0;">
                <label>🖼️ Do'kon rasmi:</label>
                <input type="file" id="shopImageFile" accept="image/*" onchange="previewShopImage(this)">
                <div class="image-preview" id="shopImagePreview"></div>
            </div>
            <button onclick="addShop()">🏪 Do'kon qo'shish</button>
        </div>

        <!-- Mahsulotlar ro'yxati -->
        <div class="admin-section">
            <h4>📋 Mahsulotlar ro'yxati</h4>
            <div id="productListAdmin"></div>
        </div>

        <!-- Do'konlar ro'yxati -->
        <div class="admin-section">
            <h4>🏪 Do'konlar ro'yxati</h4>
            <div id="shopListAdmin"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Temurshox Mebel</p>
    <a href="tel:+998941281315" class="call-btn">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Savatcha</h3>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Jami: 0 so'm</div>
    <div class="order-form">
        <h4>📝 Buyurtma ma'lumotlari</h4>
        <input type="text" id="fullName" placeholder="Ism va Familiyangiz *">
        <textarea id="address" rows="2" placeholder="To'liq manzilingiz *"></textarea>
        <input type="tel" id="phone1" placeholder="Telefon raqam 1 *">
        <input type="tel" id="phone2" placeholder="Telefon raqam 2">
        <textarea id="notes" rows="2" placeholder="Qo'shimcha ma'lumot"></textarea>
        <button class="submit-order" onclick="submitOrder()">✅ Buyurtma berish</button>
    </div>
</div>

<button class="admin-toggle" onclick="toggleAdmin()">🔧</button>

<script>
    // ============ MA'LUMOTLAR ============
    let categories = [
        { id: "divan", name: "Divanlar", emoji: "🛋️" },
        { id: "stol", name: "Stollar", emoji: "💻" },
        { id: "shkaf", name: "Shkaflar", emoji: "🚪" },
        { id: "kreslo", name: "Kreslolar", emoji: "🪑" }
    ];

    let products = [
        { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", rating: 5, emoji: "🛋️", image: null },
        { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", rating: 4, emoji: "🪑", image: null },
        { id: 3, name: "Kompyuter stoli", price: 850000, oldPrice: null, category: "stol", rating: 5, emoji: "💻", image: null },
        { id: 4, name: "Garderob shkafi", price: 2800000, oldPrice: 3200000, category: "shkaf", rating: 4, emoji: "🚪", image: null },
        { id: 5, name: "Kompyuter kreslosi", price: 1100000, oldPrice: null, category: "kreslo", rating: 5, emoji: "🪑", image: null }
    ];

    let shops = [
        { id: 1, name: "Temurshox Mebel - Chilonzor", address: "Toshkent sh., Chilonzor tumani, 3-kvartal", phone: "+998 97 935 13 15", desc: "Eng katta filialimiz", image: null },
        { id: 2, name: "Temurshox Mebel - Sergeli", address: "Toshkent sh., Sergeli tumani, Yangi hayot", phone: "+998 93 346 86 32", desc: "Yangi filial", image: null }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let currentSection = "products";
    let currentCategory = "all";
    let selectedProductImage = null;
    let selectedShopImage = null;

    // ============ SAQLASH ============
    function saveAll() {
        localStorage.setItem('categories', JSON.stringify(categories));
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('shops', JSON.stringify(shops));
    }

    function loadAll() {
        const savedCats = localStorage.getItem('categories');
        const savedProds = localStorage.getItem('products');
        const savedShops = localStorage.getItem('shops');
        
        if (savedCats) categories = JSON.parse(savedCats);
        if (savedProds) products = JSON.parse(savedProds);
        if (savedShops) shops = JSON.parse(savedShops);
        
        updateCategorySelect();
        displayCategories();
        displayProducts();
        displayShops();
        updateAdminLists();
        updateCartUI();
    }

    // ============ BO'LIMLARNI KO'RSATISH ============
    function showSection(section) {
        currentSection = section;
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if (section === 'products') {
            document.querySelector('.nav-btn:first-child').classList.add('active');
            document.getElementById('productsSection').classList.remove('hidden');
            document.getElementById('shopsSection').classList.add('hidden');
            displayProducts();
        } else {
            document.querySelector('.nav-btn:last-child').classList.add('active');
            document.getElementById('productsSection').classList.add('hidden');
            document.getElementById('shopsSection').classList.remove('hidden');
            displayShops();
        }
    }

    // ============ KATEGORIYALAR ============
    function displayCategories() {
        const container = document.getElementById('categories');
        container.innerHTML = `
            <button class="cat-btn active" data-cat="all" onclick="filterProducts('all')">🏠 Barchasi</button>
            ${categories.map(cat => `
                <button class="cat-btn" data-cat="${cat.id}" onclick="filterProducts('${cat.id}')">${cat.emoji} ${cat.name}</button>
            `).join('')}
            <button class="cat-btn" data-cat="discount" onclick="filterProducts('discount')">🔥 Chegirmali</button>
        `;
    }

    function updateCategorySelect() {
        const select = document.getElementById('productCategory');
        select.innerHTML = categories.map(cat => `<option value="${cat.id}">${cat.emoji} ${cat.name}</option>`).join('');
    }

    function addCategory() {
        const name = document.getElementById('newCategoryName').value.trim();
        const emoji = document.getElementById('newCategoryEmoji').value.trim() || "📁";
        
        if (!name) {
            showToast("❌ Kategoriya nomini yozing!", true);
            return;
        }
        
        const id = name.toLowerCase().replace(/ /g, '_');
        categories.push({ id: id, name: name, emoji: emoji });
        saveAll();
        displayCategories();
        updateCategorySelect();
        document.getElementById('newCategoryName').value = '';
        document.getElementById('newCategoryEmoji').value = '';
        showToast("✅ Kategoriya qo'shildi!");
    }

    // ============ MAHSULOTLAR ============
    function displayProducts() {
        let filtered = products.filter(product => {
            if (currentCategory === "all") return true;
            if (currentCategory === "discount") return product.oldPrice && product.oldPrice > product.price;
            return product.category === currentCategory;
        });
        
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (searchTerm) {
            filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
        }
        
        const container = document.getElementById('products');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">🔍 Hech narsa topilmadi</div>';
            return;
        }
        
        container.innerHTML = filtered.map(product => `
            <div class="product-card">
                <div class="product-img">
                    ${product.oldPrice && product.oldPrice > product.price ? `<div class="discount-badge">-${Math.round((1 - product.price/product.oldPrice)*100)}%</div>` : ''}
                    ${product.image ? `<img src="${product.image}">` : `<span style="font-size:3rem;">${product.emoji}</span>`}
                </div>
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="product-price">
                        ${formatPrice(product.price)} so'm
                        ${product.oldPrice ? `<span class="old-price">${formatPrice(product.oldPrice)} so'm</span>` : ''}
                    </div>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">🛒 Savatga qo'shish</button>
                </div>
            </div>
        `).join('');
    }

    function filterProducts(category) {
        currentCategory = category;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.cat-btn[data-cat="${category}"]`)?.classList.add('active');
        displayProducts();
    }

    function addProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const oldPrice = document.getElementById('productOldPrice').value ? parseInt(document.getElementById('productOldPrice').value) : null;
        const category = document.getElementById('productCategory').value;
        const rating = parseInt(document.getElementById('productRating').value) || 5;
        const emoji = document.getElementById('productEmoji').value.trim() || "📦";
        
        if (!name || !price) {
            showToast("❌ Nom va narxni to'ldiring!", true);
            return;
        }
        
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        products.push({
            id: newId, name, price, oldPrice, category, rating, emoji,
            image: selectedProductImage
        });
        
        saveAll();
        displayProducts();
        updateAdminLists();
        clearProductForm();
        showToast("✅ Mahsulot qo'shildi!");
    }

    function deleteProduct(id) {
        if (confirm("O'chirilsinmi?")) {
            products = products.filter(p => p.id !== id);
            saveAll();
            displayProducts();
            updateAdminLists();
            showToast("🗑 O'chirildi!");
        }
    }

    // ============ DO'KONLAR ============
    function displayShops() {
        let filtered = [...shops];
        const searchTerm = document.getElementById('shopSearchInput')?.value.toLowerCase() || '';
        if (searchTerm) {
            filtered = filtered.filter(s => s.name.toLowerCase().includes(searchTerm) || s.address.toLowerCase().includes(searchTerm));
        }
        
        const container = document.getElementById('shops');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">🏪 Hech qanday do\'kon topilmadi</div>';
            return;
        }
        
        container.innerHTML = filtered.map(shop => `
            <div class="shop-card" onclick="openShopDetails(${shop.id})">
                <div class="shop-img">
                    ${shop.image ? `<img src="${shop.image}">` : '<span style="font-size:3rem;">🏪</span>'}
                </div>
                <div class="shop-info">
                    <div class="shop-name">${shop.name}</div>
                    <div class="shop-address">📍 ${shop.address}</div>
                    <div class="shop-phone">📞 ${shop.phone}</div>
                    <button class="view-shop-btn" onclick="event.stopPropagation(); openShopDetails(${shop.id})">🔍 Batafsil</button>
                </div>
            </div>
        `).join('');
    }

    function openShopDetails(shopId) {
        const shop = shops.find(s => s.id === shopId);
        if (!shop) return;
        
        const message = `🏪 *${shop.name}*\n\n📍 *Manzil:* ${shop.address}\n📞 *Telefon:* ${shop.phone}\n📝 *Tavsif:* ${shop.desc || 'Yo\'q'}`;
        alert(message);
    }

    function addShop() {
        const name = document.getElementById('shopName').value.trim();
        const address = document.getElementById('shopAddress').value.trim();
        const phone = document.getElementById('shopPhone').value.trim();
        const desc = document.getElementById('shopDesc').value.trim();
        
        if (!name || !address || !phone) {
            showToast("❌ Do'kon nomi, manzil va telefonni to'ldiring!", true);
            return;
        }
        
        const newId = Math.max(...shops.map(s => s.id), 0) + 1;
        shops.push({
            id: newId, name, address, phone, desc,
            image: selectedShopImage
        });
        
        saveAll();
        displayShops();
        updateAdminLists();
        clearShopForm();
        showToast("✅ Do'kon qo'shildi!");
    }

    function deleteShop(id) {
        if (confirm("Do'konni o'chirilsinmi?")) {
            shops = shops.filter(s => s.id !== id);
            saveAll();
            displayShops();
            updateAdminLists();
            showToast("🗑 Do'kon o'chirildi!");
        }
    }

    // ============ SAVAT ============
    function addToCart(productId) {
        cart[productId] = (cart[productId] || 0) + 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showToast("✅ Savatga qo'shildi!");
    }

    function updateCartUI() {
        let total = 0;
        let itemCount = 0;
        const cartItems = document.getElementById('cartItems');
        
        if (Object.keys(cart).length === 0) {
            cartItems.innerHTML = '<div style="text-align:center; padding:30px;">🛒 Bo\'sh</div>';
        } else {
            cartItems.innerHTML = '';
            for (let [id, qty] of Object.entries(cart)) {
                const product = products.find(p => p.id == id);
                if (product) {
                    const subtotal = product.price * qty;
                    total += subtotal;
                    itemCount += qty;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <div><strong>${product.name}</strong><br>${formatPrice(product.price)} so'm</div>
                            <div class="cart-item-qty">
                                <button onclick="changeQty(${id}, -1)">-</button>
                                <span>${qty}</span>
                                <button onclick="changeQty(${id}, 1)">+</button>
                                <button onclick="removeFromCart(${id})" style="background:#dc3545; color:white; border:none; width:25px; border-radius:50%;">🗑</button>
                            </div>
                        </div>
                    `;
                }
            }
        }
        
        document.getElementById('cartTotal').innerHTML = `Jami: ${formatPrice(total)} so'm`;
        document.getElementById('cartCount').innerHTML = itemCount;
    }

    function changeQty(id, delta) {
        const newQty = (cart[id] || 0) + delta;
        if (newQty <= 0) delete cart[id];
        else cart[id] = newQty;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
    }

    function removeFromCart(id) {
        delete cart[id];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showToast("🗑 Olib tashlandi");
    }

    // ============ BUYURTMA ============
    function submitOrder() {
        const fullName = document.getElementById('fullName').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone1 = document.getElementById('phone1').value.trim();
        
        if (!fullName || !address || !phone1) {
            showToast("❌ Maydonlarni to'ldiring!", true);
            return;
        }
        
        if (Object.keys(cart).length === 0) {
            showToast("❌ Savat bo'sh!", true);
            return;
        }
        
        let total = 0;
        let itemsList = [];
        for (let [id, qty] of Object.entries(cart)) {
            const p = products.find(p => p.id == id);
            if (p) {
                total += p.price * qty;
                itemsList.push(`${p.name} x${qty} = ${formatPrice(p.price * qty)} so'm`);
            }
        }
        
        const orderText = `🆕 *YANGI BUYURTMA!*\n\n👤 ${fullName}\n📍 ${address}\n📞 ${phone1}\n📦 ${itemsList.join(', ')}\n💰 Jami: ${formatPrice(total)} so'm`;
        window.open(`https://t.me/shoxi0020?text=${encodeURIComponent(orderText)}`, '_blank');
        showToast("✅ Yuborildi!");
        
        cart = {};
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        document.getElementById('fullName').value = '';
        document.getElementById('address').value = '';
        document.getElementById('phone1').value = '';
        document.getElementById('phone2').value = '';
        document.getElementById('notes').value = '';
        toggleCart();
    }
