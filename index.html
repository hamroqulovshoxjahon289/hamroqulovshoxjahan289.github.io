<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Temurshox Mebel | Premium mebellar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        /* Header - Qora va Tilla */
        .header {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            border-bottom: 2px solid #ffd700;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 1.5rem;
            color: #ffd700;
        }

        .logo p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Search */
        .search-bar {
            flex: 1;
            max-width: 400px;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ffd700;
            border-radius: 25px;
            font-size: 0.9rem;
            background: #1a1a1a;
            color: #fff;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #ffaa00;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .search-bar button:hover {
            background: #ffaa00;
            transform: scale(1.02);
        }

        /* User info */
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            cursor: pointer;
            padding: 8px 15px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            border-radius: 25px;
            transition: 0.3s;
        }

        .user-info span:hover {
            background: rgba(255,215,0,0.4);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            background: #111;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #ffd70033;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: #1a1a1a;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: #e0e0e0;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #000;
        }

        .tab-btn:hover:not(.active) {
            background: #2a2a2a;
        }

        /* Tab content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #ffd70033;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            color: #ffd700;
        }

        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ffd700;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
        }

        /* Products grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #ffd70033;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.2);
            border-color: #ffd700;
        }

        .product-emoji {
            font-size: 4rem;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-bottom: 1px solid #ffd70033;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .product-price {
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: bold;
        }

        .product-oldprice {
            font-size: 0.9rem;
            color: #888;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .product-stock {
            margin: 10px 0;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.8rem;
        }

        .stock-available {
            background: #1a3a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
        }

        .stock-low {
            background: #3a2a1a;
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .stock-out {
            background: #3a1a1a;
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #ffd700;
            color: #000;
        }

        .btn-primary:hover {
            background: #ffaa00;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .btn-success {
            background: #00aa44;
            color: white;
        }

        .btn-danger {
            background: #cc3333;
            color: white;
        }

        .btn-warning {
            background: #ffd700;
            color: #000;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #111;
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #ffd700;
        }

        /* Cart */
        .cart-items, .delivery-form, .review-card, .store-card, .admin-section {
            background: #111;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffd70033;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ffd70033;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            flex: 2;
        }

        .cart-item-title {
            font-weight: bold;
            color: #ffd700;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ffd700;
            border-radius: 50%;
            background: #1a1a1a;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .quantity-btn:hover {
            background: #ffd700;
            color: #000;
        }

        .cart-total {
            background: #111;
            border-radius: 15px;
            padding: 20px;
            text-align: right;
            font-size: 1.3rem;
            font-weight: bold;
            border: 1px solid #ffd70033;
        }

        /* Forms */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ffd700;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffaa00;
        }

        label {
            color: #ffd700;
        }

        /* Reviews */
        .review-user {
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffd700;
        }

        .review-rating {
            color: #ffd700;
            margin-bottom: 10px;
        }

        /* Stars */
        .star {
            font-size: 2rem;
            cursor: pointer;
            color: #444;
            transition: color 0.2s;
        }

        .star.active, .star:hover {
            color: #ffd700;
        }

        /* Messages */
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #000;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .message-success {
            background: #00ff44;
        }

        .message-error {
            background: #ff4444;
            color: white;
        }

        .message-info {
            background: #ffd700;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .search-bar {
                max-width: 100%;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <h1>🛋️ Temurshox Mebel</h1>
                <p>Sifatli va zamonaviy mebellar</p>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish..." onkeyup="searchProducts()">
                <button onclick="searchProducts()">Qidirish</button>
            </div>
            <div class="user-info">
                <span id="userNameDisplay" onclick="showLoginModal()">👤 Kirish</span>
                <span id="cartIcon" onclick="switchTab('cart')">🛒 <span id="cartCount">0</span></span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="products">🛍️ Mahsulotlar</button>
            <button class="tab-btn" data-tab="cart">🛒 Savat</button>
            <button class="tab-btn" data-tab="orders">📦 Buyurtmalarim</button>
            <button class="tab-btn" data-tab="reviews">⭐ Sharhlar</button>
            <button class="tab-btn" data-tab="stores">🏪 Do'konlar</button>
            <button class="tab-btn" data-tab="admin">👑 Admin</button>
        </div>

        <!-- Filters -->
        <div id="productsTab" class="tab-content active">
            <div class="filters">
                <div class="filter-group">
                    <label>📊 Saralash:</label>
                    <select id="sortBy" onchange="filterAndSortProducts()">
                        <option value="default">Standart</option>
                        <option value="price_asc">Narxi: Arzon → Qimmat</option>
                        <option value="price_desc">Narxi: Qimmat → Arzon</option>
                        <option value="popular">Eng ko'p sotilgan</option>
                        <option value="discount">Eng katta chegirma</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>💰 Narx oralig'i:</label>
                    <input type="number" id="minPrice" placeholder="Min" style="width:100px" onchange="filterAndSortProducts()">
                    <span>-</span>
                    <input type="number" id="maxPrice" placeholder="Max" style="width:100px" onchange="filterAndSortProducts()">
                </div>
                <div class="filter-group">
                    <label>📦 Holati:</label>
                    <select id="stockFilter" onchange="filterAndSortProducts()">
                        <option value="all">Hammasi</option>
                        <option value="instock">Mavjud</option>
                        <option value="lowstock">Kam qolgan</option>
                        <option value="outofstock">Tugagan</option>
                    </select>
                </div>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- Savat -->
        <div id="cartTab" class="tab-content">
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <div class="delivery-form" id="deliveryForm" style="display:none;">
                <h3 style="color:#ffd700;">🚚 Yetkazib berish ma'lumotlari</h3>
                <input type="text" id="deliveryName" placeholder="Ismingiz">
                <input type="text" id="deliveryPhone" placeholder="Telefon raqam">
                <textarea id="deliveryAddress" rows="3" placeholder="To'liq manzil (tuman, ko'cha, uy)"></textarea>
                <input type="text" id="couponCode" placeholder="🎟️ Chegirma kodi (ixtiyoriy)">
                <button class="btn btn-success" onclick="applyCoupon()">🎁 Chegirma qo'llash</button>
            </div>
        </div>

        <!-- Buyurtmalarim -->
        <div id="ordersTab" class="tab-content">
            <div id="ordersList"></div>
        </div>

        <!-- Sharhlar -->
        <div id="reviewsTab" class="tab-content">
            <div id="reviewsList"></div>
            <div class="delivery-form">
                <h3 style="color:#ffd700;">✍️ Sharh qoldirish</h3>
                <select id="reviewProductSelect">
                    <option value="">Mahsulot tanlang</option>
                </select>
                <div class="rating-input" id="ratingStars" style="display:flex; gap:10px; margin:15px 0;">
                    <span class="star" data-rating="1">☆</span>
                    <span class="star" data-rating="2">☆</span>
                    <span class="star" data-rating="3">☆</span>
                    <span class="star" data-rating="4">☆</span>
                    <span class="star" data-rating="5">☆</span>
                </div>
                <textarea id="reviewText" rows="3" placeholder="Sharhingizni yozing..."></textarea>
                <button class="btn btn-primary" onclick="addReview()">Sharh qoldirish</button>
            </div>
        </div>

        <!-- Do'konlar -->
        <div id="storesTab" class="tab-content">
            <div id="storesList"></div>
        </div>

        <!-- Admin -->
        <div id="adminTab" class="tab-content">
            <div class="admin-section">
                <h3 style="color:#ffd700;">👑 Admin panel</h3>
                <input type="password" id="adminCode" placeholder="Admin kodini kiriting">
                <button class="btn btn-primary" onclick="verifyAdmin()">Kirish</button>
                <div id="adminPanel" style="display:none; margin-top:20px;">
                    <h4 style="color:#ffd700;">🏪 Yangi do'kon qo'shish</h4>
                    <input type="text" id="storeName" placeholder="Do'kon nomi">
                    <input type="text" id="storeAddress" placeholder="Manzil">
                    <input type="tel" id="storePhone" placeholder="Telefon">
                    <input type="text" id="storeLat" placeholder="Kenglik">
                    <input type="text" id="storeLng" placeholder="Uzunlik">
                    <input type="text" id="storeHours" placeholder="Ish vaqti">
                    <button class="btn btn-success" onclick="addStore()">Do'kon qo'shish</button>
                    
                    <h4 style="color:#ffd700; margin-top:30px;">📦 Mahsulot sonini o'zgartirish</h4>
                    <select id="stockProductSelect">
                        <option value="">Mahsulot tanlang</option>
                    </select>
                    <input type="number" id="newStock" placeholder="Yangi son">
                    <button class="btn btn-primary" onclick="updateStock()">Yangilash</button>
                    
                    <h4 style="color:#ffd700; margin-top:30px;">🎟️ Chegirma kodi qo'shish</h4>
                    <input type="text" id="couponName" placeholder="Kod nomi">
                    <input type="number" id="couponPercent" placeholder="Chegirma foizi">
                    <button class="btn btn-warning" onclick="addCoupon()">Kod qo'shish</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔐 Kirish / Ro'yxatdan o'tish</h3>
                <span class="close-modal" onclick="closeModal('loginModal')">&times;</span>
            </div>
            <input type="text" id="loginName" placeholder="Ismingiz">
            <input type="text" id="loginPhone" placeholder="Telefon raqam">
            <button class="btn btn-primary" onclick="login()">Kirish</button>
        </div>
    </div>

    <script>
        // ============ MA'LUMOTLAR ============
        let products = {
            "1": {"name": "Angliya divani", "price": 3200000, "oldPrice": 3800000, "category": "divan", "emoji": "🛋️", "sales": 0, "stock": 10},
            "2": {"name": "Luks divan", "price": 4500000, "oldPrice": 5200000, "category": "divan", "emoji": "🪑", "sales": 0, "stock": 5},
            "3": {"name": "Kompyuter stoli", "price": 850000, "oldPrice": null, "category": "stol", "emoji": "💻", "sales": 0, "stock": 15},
            "4": {"name": "Garderob shkafi", "price": 2800000, "oldPrice": 3200000, "category": "shkaf", "emoji": "🚪", "sales": 0, "stock": 3},
            "5": {"name": "Kompyuter kreslosi", "price": 1100000, "oldPrice": null, "category": "kreslo", "emoji": "🪑", "sales": 0, "stock": 8}
        };

        let reviews = {};
        let stores = {
            "1": {
                "name": "Temurshox Mebel",
                "address": "Toshkent shahar, Chilonzor tumani, 12-uy",
                "phone": "+998941281315",
                "latitude": 41.2995,
                "longitude": 69.2401,
                "working_hours": "09:00 - 21:00"
            }
        };
        
        let coupons = {
            "WELCOME10": {percent: 10, active: true},
            "SALE20": {percent: 20, active: true}
        };
        
        let cart = {};
        let orders = [];
        let currentUser = null;
        let isAdmin = false;
        let appliedCoupon = null;
        let currentSearch = "";
        let currentFilters = {sort: "default", minPrice: "", maxPrice: "", stock: "all"};
        let selectedRating = 0;
        
        const ADMIN_CODE = "ADMIN2025";

        // ============ FOYDALANUVCHI TIZIMI ============
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function login() {
            let name = document.getElementById('loginName').value;
            let phone = document.getElementById('loginPhone').value;
            
            if (!name || !phone) {
                showMessage("Ism va telefon raqamni kiriting!", "error");
                return;
            }
            
            currentUser = {
                name: name,
                phone: phone,
                joined: new Date().toISOString()
            };
            
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('userNameDisplay').innerHTML = `👤 ${name}`;
            closeModal('loginModal');
            showMessage(`✅ Xush kelibsiz, ${name}!`, "success");
            loadUserOrders();
        }

        function loadUserOrders() {
            if (currentUser) {
                let savedOrders = localStorage.getItem(`orders_${currentUser.phone}`);
                if (savedOrders) {
                    orders = JSON.parse(savedOrders);
                }
            }
            renderOrders();
        }

        // ============ QIDIRUV VA FILTER ============
        function searchProducts() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            filterAndSortProducts();
        }

        function filterAndSortProducts() {
            currentFilters.sort = document.getElementById('sortBy').value;
            currentFilters.minPrice = document.getElementById('minPrice').value;
            currentFilters.maxPrice = document.getElementById('maxPrice').value;
            currentFilters.stock = document.getElementById('stockFilter').value;
            renderProducts();
        }

        // ============ MAHSULOTLAR ============
        function renderProducts() {
            let container = document.getElementById('productsGrid');
            if (!container) return;
            
            let filtered = Object.entries(products).filter(([id, p]) => {
                if (currentSearch && !p.name.toLowerCase().includes(currentSearch)) return false;
                let min = currentFilters.minPrice ? parseInt(currentFilters.minPrice) : 0;
                let max = currentFilters.maxPrice ? parseInt(currentFilters.maxPrice) : Infinity;
                if (p.price < min || p.price > max) return false;
                if (currentFilters.stock === "instock" && p.stock <= 0) return false;
                if (currentFilters.stock === "lowstock" && (p.stock > 5 || p.stock === 0)) return false;
                if (currentFilters.stock === "outofstock" && p.stock > 0) return false;
                return true;
            });
            
            switch(currentFilters.sort) {
                case "price_asc": filtered.sort((a,b) => a[1].price - b[1].price); break;
                case "price_desc": filtered.sort((a,b) => b[1].price - a[1].price); break;
                case "popular": filtered.sort((a,b) => b[1].sales - a[1].sales); break;
                case "discount": filtered.sort((a,b) => {
                    let discA = a[1].oldPrice ? (1 - a[1].price/a[1].oldPrice) : 0;
                    let discB = b[1].oldPrice ? (1 - b[1].price/b[1].oldPrice) : 0;
                    return discB - discA;
                }); break;
            }
            
            let html = '';
            for (let [id, p] of filtered) {
                let stockClass = p.stock > 5 ? 'stock-available' : (p.stock > 0 ? 'stock-low' : 'stock-out');
                let stockText = p.stock > 0 ? `${p.stock} ta mavjud` : 'Tugagan';
                let discountHtml = p.oldPrice ? `<span class="product-oldprice">${p.oldPrice.toLocaleString()} so'm</span>` : '';
                let discountPercent = p.oldPrice ? Math.round((1 - p.price/p.oldPrice) * 100) : 0;
                
                html += `
                    <div class="product-card" onclick="showProductModal('${id}')">
                        <div class="product-emoji">${p.emoji}</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div>
                                <span class="product-price">${p.price.toLocaleString()} so'm</span>
                                ${discountHtml}
                                ${discountPercent ? `<span style="color:#ffd700; margin-left:10px;">-${discountPercent}%</span>` : ''}
                            </div>
                            <div class="product-stock ${stockClass}">📦 ${stockText}</div>
                            <div class="product-sales">📊 Sotilgan: ${p.sales} ta</div>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); addToCart('${id}')" ${p.stock <= 0 ? 'disabled' : ''}>
                                🛒 Savatga qo'shish
                            </button>
                        </div>
                    </div>
                `;
            }
            
            if (html === '') {
                html = '<p style="text-align:center; padding:40px;">🔍 Hech qanday mahsulot topilmadi</p>';
            }
            container.innerHTML = html;
        }

        function showProductModal(productId) {
            let p = products[productId];
            let stockStatus = p.stock > 0 ? `✅ ${p.stock} ta mavjud` : '❌ Tugagan';
            let discountHtml = p.oldPrice ? `<p>Eski narx: <del>${p.oldPrice.toLocaleString()} so'm</del> <span style="color:#ffd700;">-${Math.round((1-p.price/p.oldPrice)*100)}%</span></p>` : '';
            
            let modalHtml = `
                <div class="modal active" id="productModal" onclick="if(event.target===this) closeModal('productModal')">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>${p.emoji} ${p.name}</h3>
                            <span class="close-modal" onclick="closeModal('productModal')">&times;</span>
                        </div>
                        <p>💰 Narxi: <strong style="color:#ffd700;">${p.price.toLocaleString()} so'm</strong></p>
                        ${discountHtml}
                        <p>📦 Holati: ${stockStatus}</p>
                        <p>📊 Sotilgan: ${p.sales} ta</p>
                        <p>📂 Kategoriya: ${p.category}</p>
                        <button class="btn btn-primary" onclick="addToCart('${productId}'); closeModal('productModal')" ${p.stock <= 0 ? 'disabled' : ''}>
                            🛒 Savatga qo'shish
                        </button>
                        <button class="btn btn-warning" onclick="closeModal('productModal')" style="margin-top:10px;">Yopish</button>
                    </div>
                </div>
            `;
            
            let oldModal = document.getElementById('productModal');
            if (oldModal) oldModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        // ============ SAVAT ============
        function addToCart(productId) {
            let product = products[productId];
            if (!product) return;
            
            if (!currentUser) {
                showMessage("Iltimos, avval kiring!", "error");
                showLoginModal();
                return;
            }
            
            if (product.stock <= 0) {
                showMessage("❌ Mahsulot tugagan!", "error");
                return;
            }
            
            let currentQty = cart[productId] || 0;
            if (currentQty + 1 > product.stock) {
                showMessage(`❌ Faqat ${product.stock} ta mavjud!`, "error");
                return;
            }
            
            cart[productId] = currentQty + 1;
            updateCartUI();
            updateCartCount();
            showMessage("✅ Savatga qo'shildi!", "success");
        }

        function updateCartQuantity(productId, change) {
            let product = products[productId];
            if (!product) return;
            
            let currentQty = cart[productId] || 0;
            let newQty = currentQty + change;
            
            if (newQty <= 0) {
                delete cart[productId];
            } else if (newQty > product.stock) {
                showMessage(`❌ Faqat ${product.stock} ta mavjud!`, "error");
                return;
            } else {
                cart[productId] = newQty;
            }
            
            updateCartUI();
            updateCartCount();
        }

        function clearCart() {
            cart = {};
            updateCartUI();
            updateCartCount();
            showMessage("🗑 Savat tozalandi!", "success");
        }

        function applyCoupon() {
            let code = document.getElementById('couponCode').value.toUpperCase();
            if (coupons[code] && coupons[code].active) {
                appliedCoupon = coupons[code];
                showMessage(`🎉 ${code} kodi qo'llandi! ${appliedCoupon.percent}% chegirma`, "success");
                updateCartUI();
            } else {
                showMessage("❌ Noto'g'ri yoki eskirgan kod!", "error");
            }
        }
