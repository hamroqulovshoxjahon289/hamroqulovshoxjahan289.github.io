<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Temurshox Mebel | Premium mebel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
        }

        header h1 span {
            color: #ffd700;
        }

        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: white;
            border-radius: 60px;
            padding: 5px;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 10px 25px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .cat-btn:hover {
            transform: translateY(-2px);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .product-img {
            width: 100%;
            height: 220px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 18px;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .rating {
            color: #ffc107;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            opacity: 0.9;
        }

        .cart-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-qty button {
            background: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-total {
            padding: 15px;
            border-top: 2px solid #eee;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
        }

        .order-form {
            padding: 15px;
            background: #f8f9fa;
            margin: 15px;
            border-radius: 15px;
        }

        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .submit-order {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            background: #0f2027;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        .call-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 10px;
        }

        .admin-toggle {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #2c3e50;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 200;
            border: none;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-top: 40px;
        }

        .admin-panel input, .admin-panel select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .admin-panel button {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .image-preview {
            margin: 10px 0;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .product-list-admin {
            margin-top: 20px;
        }

        .product-list-admin div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛋️ Temurshox <span>Mebel</span></h1>
    <p>✨ Sifat va qulaylik uchrashgan joy ✨</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish...">
    </div>

    <div class="categories">
        <button class="cat-btn active" data-cat="all">🏠 Barchasi</button>
        <button class="cat-btn" data-cat="divan">🛋️ Divanlar</button>
        <button class="cat-btn" data-cat="stol">💻 Stollar</button>
        <button class="cat-btn" data-cat="shkaf">🚪 Shkaflar</button>
        <button class="cat-btn" data-cat="kreslo">🪑 Kreslolar</button>
        <button class="cat-btn" data-cat="discount">🔥 Chegirmali</button>
    </div>

    <div class="products" id="products"></div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>🔧 Admin Panel - Mahsulot qo'shish</h3>
        <input type="text" id="productName" placeholder="Mahsulot nomi">
        <input type="number" id="productPrice" placeholder="Narxi (so'm)">
        <input type="number" id="productOldPrice" placeholder="Eski narxi (ixtiyoriy)">
        <select id="productCategory">
            <option value="divan">Divan</option>
            <option value="stol">Stol</option>
            <option value="shkaf">Shkaf</option>
            <option value="kreslo">Kreslo</option>
        </select>
        <input type="number" id="productRating" placeholder="Reyting (1-5)" value="5">
        <input type="text" id="productEmoji" placeholder="Emoji (masalan: 🛋️)">
        
        <!-- RASM YUKLASH (Fayl tanlash) -->
        <div style="margin: 10px 0;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">🖼️ Mahsulot rasmi:</label>
            <input type="file" id="productImageFile" accept="image/*" onchange="previewImage(this)">
            <div class="image-preview" id="imagePreview"></div>
        </div>
        
        <button onclick="addProduct()">➕ Mahsulot qo'shish</button>
        <div class="product-list-admin" id="productListAdmin"></div>
    </div>
</div>

<footer>
    <p>© 2025 Temurshox Mebel | Barcha huquqlar himoyalangan</p>
    <a href="tel:+998941281315" class="call-btn">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Savatcha</h3>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Jami: 0 so'm</div>
    <div class="order-form">
        <h4>📝 Buyurtma ma'lumotlari</h4>
        <input type="text" id="fullName" placeholder="Ism va Familiyangiz *">
        <textarea id="address" rows="2" placeholder="To'liq manzilingiz *"></textarea>
        <input type="tel" id="phone1" placeholder="Telefon raqam 1 *">
        <input type="tel" id="phone2" placeholder="Telefon raqam 2 (ixtiyoriy)">
        <textarea id="notes" rows="2" placeholder="Qo'shimcha ma'lumot"></textarea>
        <button class="submit-order" onclick="submitOrder()">✅ Buyurtma berish</button>
    </div>
</div>

<button class="admin-toggle" onclick="toggleAdmin()">🔧</button>

<script>
    // ============ MAHSULOTLAR ============
    let products = [
        { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", rating: 5, emoji: "🛋️", image: null, sales: 15 },
        { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", rating: 4, emoji: "🪑", image: null, sales: 12 },
        { id: 3, name: "Burchak divan", price: 5800000, oldPrice: 6500000, category: "divan", rating: 5, emoji: "📐", image: null, sales: 8 },
        { id: 4, name: "Kompyuter stoli", price: 850000, oldPrice: null, category: "stol", rating: 5, emoji: "💻", image: null, sales: 25 },
        { id: 5, name: "Ovqatlanish stoli", price: 1200000, oldPrice: 1500000, category: "stol", rating: 4, emoji: "🍽️", image: null, sales: 18 },
        { id: 6, name: "Kofe stoli", price: 450000, oldPrice: null, category: "stol", rating: 4, emoji: "☕", image: null, sales: 30 },
        { id: 7, name: "Garderob shkafi", price: 2800000, oldPrice: 3200000, category: "shkaf", rating: 4, emoji: "🚪", image: null, sales: 10 },
        { id: 8, name: "Kitob shkafi", price: 1500000, oldPrice: null, category: "shkaf", rating: 5, emoji: "📚", image: null, sales: 7 },
        { id: 9, name: "Oyoq kiyim shkafi", price: 650000, oldPrice: null, category: "shkaf", rating: 4, emoji: "👞", image: null, sales: 20 },
        { id: 10, name: "Kompyuter kreslosi", price: 1100000, oldPrice: null, category: "kreslo", rating: 5, emoji: "🪑", image: null, sales: 35 },
        { id: 11, name: "Tebranma kreslo", price: 950000, oldPrice: null, category: "kreslo", rating: 5, emoji: "🌊", image: null, sales: 22 },
        { id: 12, name: "Ziyofat kreslosi", price: 550000, oldPrice: null, category: "kreslo", rating: 4, emoji: "👑", image: null, sales: 28 }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let currentCategory = "all";
    let searchTerm = "";
    let selectedImageData = null;

    // ============ RASM PREVIEW ============
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageData = e.target.result;
                preview.innerHTML = `<img src="${selectedImageData}" alt="Rasm preview">`;
            };
            reader.readAsDataURL(input.files[0]);
        } else {
            selectedImageData = null;
            preview.innerHTML = '';
        }
    }

    // ============ MAHSULOTLARNI KO'RSATISH ============
    function displayProducts() {
        searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = products.filter(product => {
            let matchCat = currentCategory === "all" || product.category === currentCategory;
            let matchDiscount = currentCategory !== "discount" || (product.oldPrice && product.oldPrice > product.price);
            let matchSearch = product.name.toLowerCase().includes(searchTerm);
            return matchCat && matchDiscount && matchSearch;
        });
        
        const container = document.getElementById('products');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; background:white; border-radius:20px;">🔍 Hech qanday mahsulot topilmadi</div>';
            return;
        }
        
        container.innerHTML = filtered.map(product => `
            <div class="product-card">
                <div class="product-img">
                    ${product.oldPrice && product.oldPrice > product.price ? `<div class="discount-badge">-${Math.round((1 - product.price/product.oldPrice)*100)}%</div>` : ''}
                    ${product.image ? `<img src="${product.image}" alt="${product.name}">` : `<span style="font-size:3rem;">${product.emoji}</span>`}
                </div>
                <div class="product-info">
                    <div class="product-title">${product.name}</div>
                    <div class="rating">${'⭐'.repeat(product.rating)}</div>
                    <div class="product-price">
                        ${formatPrice(product.price)} so'm
                        ${product.oldPrice && product.oldPrice > product.price ? `<span class="old-price">${formatPrice(product.oldPrice)} so'm</span>` : ''}
                    </div>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">🛒 Savatga qo'shish</button>
                </div>
            </div>
        `).join('');
    }

    // ============ FILTRLASH ============
    function filterProducts(category) {
        currentCategory = category;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-cat') === category) {
                btn.classList.add('active');
            }
        });
        displayProducts();
    }

    // ============ QIDIRUV ============
    document.getElementById('searchInput').addEventListener('keyup', function() {
        displayProducts();
    });

    // Kategoriya tugmalariga event listener
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            filterProducts(this.getAttribute('data-cat'));
        });
    });

    // ============ SAVAT ============
    function addToCart(productId) {
        cart[productId] = (cart[productId] || 0) + 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showToast("✅ Savatga qo'shildi!");
    }

    function updateCartUI() {
        const cartItems = document.getElementById('cartItems');
        let total = 0;
        let itemCount = 0;
        
        if (Object.keys(cart).length === 0) {
            cartItems.innerHTML = '<div style="text-align:center; padding:30px;">🛒 Savatcha bo\'sh</div>';
        } else {
            cartItems.innerHTML = '';
            for (let [id, qty] of Object.entries(cart)) {
                const product = products.find(p => p.id == id);
                if (product) {
                    const subtotal = product.price * qty;
                    total += subtotal;
                    itemCount += qty;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <div style="font-weight:bold;">${product.name}</div>
                                <div style="font-size:0.85rem; color:#667eea;">${formatPrice(product.price)} so'm</div>
                            </div>
                            <div class="cart-item-qty">
                                <button onclick="changeQty(${id}, -1)">-</button>
                                <span>${qty}</span>
                                <button onclick="changeQty(${id}, 1)">+</button>
                                <button onclick="removeFromCart(${id})" style="background:#dc3545; color:white; border:none; width:28px; height:28px; border-radius:50%; cursor:pointer;">🗑</button>
                            </div>
                        </div>
                    `;
                }
            }
        }
        
        document.getElementById('cartTotal').innerHTML = `Jami: ${formatPrice(total)} so'm`;
        document.getElementById('cartCount').innerHTML = itemCount;
    }

    function changeQty(productId, delta) {
        const newQty = (cart[productId] || 0) + delta;
        if (newQty <= 0) {
            delete cart[productId];
        } else {
            cart[productId] = newQty;
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
    }

    function removeFromCart(productId) {
        delete cart[productId];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showToast("🗑 Olib tashlandi");
    }

    // ============ BUYURTMA ============
    function submitOrder() {
        const fullName = document.getElementById('fullName').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone1 = document.getElementById('phone1').value.trim();
        
        if (!fullName || !address || !phone1) {
            showToast("❌ Iltimos, barcha maydonlarni to'ldiring!", true);
            return;
        }
        
        if (Object.keys(cart).length === 0) {
            showToast("❌ Savatingiz bo'sh!", true);
            return;
        }
        
        let total = 0;
        let itemsList = [];
        for (let [id, qty] of Object.entries(cart)) {
            const product = products.find(p => p.id == id);
            if (product) {
                const subtotal = product.price * qty;
                total += subtotal;
                itemsList.push(`${product.name} x${qty} = ${formatPrice(subtotal)} so'm`);
            }
        }
        
        const phone2 = document.getElementById('phone2').value.trim();
        const notes = document.getElementById('notes').value.trim();
        
        const orderText = `🆕 *YANGI BUYURTMA!* 🆕
        
👤 *Mijoz:* ${fullName}
📍 *Manzil:* ${address}
📞 *Telefon 1:* ${phone1}
${phone2 ? `📞 *Telefon 2:* ${phone2}` : ''}
${notes ? `📝 *Qo'shimcha:* ${notes}` : ''}

📦 *Mahsulotlar:*
${itemsList.join('\n')}

💰 *Jami: ${formatPrice(total)} so'm*

⏰ *Vaqt:* ${new Date().toLocaleString('uz-UZ')}`;
        
        window.open(`https://t.me/shoxi0020?text=${encodeURIComponent(orderText)}`, '_blank');
        showToast("✅ Buyurtmangiz yuborildi!");
        
        cart = {};
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        
        document.getElementById('fullName').value = '';
        document.getElementById('address').value = '';
        document.getElementById('phone1').value = '';
        document.getElementById('phone2').value = '';
        document.getElementById('notes').value = '';
        
        setTimeout(() => toggleCart(), 2000);
    }

    // ============ ADMIN FUNKSIYALARI ============
    function addProduct() {
        const name = document.getElementById('productName').value.trim();
        const price = parseInt(document.getElementById('productPrice').value);
        const oldPrice = document.getElementById('productOldPrice').value ? parseInt(document.getElementById('productOldPrice').value) : null;
        const category = document.getElementById('productCategory').value;
        const rating = parseInt(document.getElementById('productRating').value) || 5;
        const emoji = document.getElementById('productEmoji').value.trim() || "📦";
        const image = selectedImageData;
        
        if (!name || !price) {
            showToast("❌ Nom va narxni to'ldiring!", true);
            return;
        }
        
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        
        const newProduct = {
            id: newId,
            name: name,
            price: price,
            oldPrice: oldPrice,
            category: category,
            rating: rating,
            emoji: emoji,
            image: image,
            sales: 0
        };
        
        products.push(newProduct);
        saveProducts();
        displayProducts();
        updateAdminList();
        clearForm();
        showToast("✅ Mahsulot qo'shildi!");
    }

    function deleteProduct(id) {
        if (confirm("Mahsulotni o'chirmoqchimisiz?")) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            displayProducts();
            updateAdminList();
            showToast("🗑 Mahsulot o'chirildi!");
        }
    }

    function saveProducts() {
        localStorage.setItem('products', JSON.stringify(products));
    }

    function loadProducts() {
        const saved = localStorage.getItem('products');
        if (saved) {
            products = JSON.parse(saved);
        } else {
            saveProducts();
        }
        displayProducts();
        updateAdminList();
    }

    function updateAdminList() {
        const container = document.getElementById('productListAdmin');
        container.innerHTML = products.map(p => `
            <div>
                <span>${p.image ? '🖼️' : p.emoji} ${p.name} - ${formatPrice(p.price)} so'm</span>
                <button onclick="deleteProduct(${p.id})" style="background:#dc3545; color:white; border:none; padding:5px 12px; border-radius:8px; cursor:pointer;">🗑</button>
            </div>
        `).join('');
    }

    function clearForm() {
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productOldPrice').value = '';
        document.getElementById('productEmoji').value = '';
        document.getElementById('productRating').value = '5';
        document.getElementById('productImageFile').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        selectedImageData = null;
    }

    // ============ YORDAMCHI FUNKSIYALAR ============
    function formatPrice(price) {
        return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function showToast(message, isError = false) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#dc3545' : '#28a745'};
                color: white;
                padding: 12px 24px;
                border-radius: 50px;
                z-index: 2000;
                font-weight: bold;
            `;
            document.body.appendChild(toast);
        }
        toast.style.background = isError ? '#dc3545' : '#28a745';
        toast.innerHTML = message;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('open');
    }

    let adminPassword = "admin123";
    function toggleAdmin() {
        const panel = document.getElementById('adminPanel');
        if (panel.style.display === 'none') {
            const pwd = prompt("Admin parolini kiriting:");
            if (pwd === adminPassword) {
                panel.style.display = 'block';
                updateAdminList();
            } else {
                showToast("Noto'g'ri parol!", true);
            }
        } else {
            panel.style.display = 'none';
        }
    }

    // ============ BOSHLASH ============
    loadProducts();
    updateCartUI();
</script>

</body>
</html>
