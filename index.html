<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temurshox Mebel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0f2027, #203a43);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 span {
            color: #ffd700;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Tugmalar */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
        }

        .nav-btn.active {
            background: #764ba2;
            color: white;
        }

        /* Qidiruv */
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
        }

        /* Kategoriyalar */
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .cat-btn.active {
            background: #764ba2;
            color: white;
        }

        /* Mahsulotlar */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-img {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .product-price {
            color: #764ba2;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9rem;
            margin-left: 8px;
        }

        .add-to-cart {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Do'konlar */
        .shops {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .shop-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-5px);
        }

        .shop-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #203a43;
        }

        .shop-address {
            color: #666;
            margin: 8px 0;
        }

        .shop-phone {
            color: #28a745;
            font-weight: bold;
        }

        /* Savat */
        .cart-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #764ba2;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 100;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 350px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            background: #203a43;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }

        .cart-items {
            padding: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-total {
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }

        .order-form {
            padding: 15px;
        }

        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .submit-order {
            background: #28a745;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            background: #0f2027;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        .call-btn {
            background: #25D366;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #203a43;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            z-index: 100;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }

        .admin-panel input, .admin-panel select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .admin-panel button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .admin-section {
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>🛋️ Temurshox <span>Mebel</span></h1>
    <p>✨ Sifat va qulaylik uchrashgan joy ✨</p>
</header>

<div class="container">
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showSection('products')">🛍️ Mahsulotlar</button>
        <button class="nav-btn" onclick="showSection('shops')">🏪 Do'konlar</button>
    </div>

    <!-- Mahsulotlar -->
    <div id="productsSection">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Mahsulot qidirish...">
        </div>
        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <!-- Do'konlar -->
    <div id="shopsSection" class="hidden">
        <div class="search-box">
            <input type="text" id="shopSearchInput" placeholder="🔍 Do'kon qidirish...">
        </div>
        <div class="shops" id="shops"></div>
    </div>

    <!-- Admin panel -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>🔧 Admin Panel</h3>
        
        <div class="admin-section">
            <h4>📂 Yangi kategoriya</h4>
            <input type="text" id="newCatName" placeholder="Kategoriya nomi">
            <input type="text" id="newCatEmoji" placeholder="Emoji (🛋️)">
            <button onclick="addCategory()">➕ Kategoriya qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>🛍️ Yangi mahsulot</h4>
            <input type="text" id="prodName" placeholder="Mahsulot nomi">
            <input type="number" id="prodPrice" placeholder="Narxi">
            <input type="number" id="prodOldPrice" placeholder="Eski narxi">
            <select id="prodCategory"></select>
            <input type="text" id="prodEmoji" placeholder="Emoji">
            <button onclick="addProduct()">➕ Mahsulot qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>🏪 Yangi do'kon</h4>
            <input type="text" id="shopName" placeholder="Do'kon nomi">
            <input type="text" id="shopAddress" placeholder="Manzil">
            <input type="text" id="shopPhone" placeholder="Telefon">
            <textarea id="shopDesc" rows="2" placeholder="Tavsif"></textarea>
            <button onclick="addShop()">🏪 Do'kon qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>📋 Mahsulotlar</h4>
            <div id="productList"></div>
        </div>

        <div class="admin-section">
            <h4>🏪 Do'konlar</h4>
            <div id="shopList"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Temurshox Mebel</p>
    <a href="tel:+998941281315" class="call-btn">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>🛒 Savatcha</h3>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Jami: 0 so'm</div>
    <div class="order-form">
        <input type="text" id="fullName" placeholder="Ism Familiya">
        <textarea id="address" rows="2" placeholder="Manzil"></textarea>
        <input type="tel" id="phone" placeholder="Telefon">
        <button class="submit-order" onclick="submitOrder()">✅ Buyurtma berish</button>
    </div>
</div>

<button class="admin-toggle" onclick="toggleAdmin()">🔧</button>

<script>
    // MA'LUMOTLAR
    let categories = [
        { id: "divan", name: "Divanlar", emoji: "🛋️" },
        { id: "stol", name: "Stollar", emoji: "💻" },
        { id: "shkaf", name: "Shkaflar", emoji: "🚪" },
        { id: "kreslo", name: "Kreslolar", emoji: "🪑" }
    ];

    let products = [
        { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", emoji: "🛋️" },
        { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", emoji: "🪑" },
        { id: 3, name: "Kompyuter stoli", price: 850000, oldPrice: null, category: "stol", emoji: "💻" },
        { id: 4, name: "Garderob shkafi", price: 2800000, oldPrice: 3200000, category: "shkaf", emoji: "🚪" },
        { id: 5, name: "Kompyuter kreslosi", price: 1100000, oldPrice: null, category: "kreslo", emoji: "🪑" }
    ];

    let shops = [
        { id: 1, name: "Chilonzor filiali", address: "Chilonzor tumani, 3-kvartal", phone: "+998 97 935 13 15", desc: "Markaziy filial" },
        { id: 2, name: "Sergeli filiali", address: "Sergeli tumani, Yangi hayot", phone: "+998 93 346 86 32", desc: "Yangi filial" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let currentCat = "all";

    // Saqlash
    function saveData() {
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('shops', JSON.stringify(shops));
        localStorage.setItem('categories', JSON.stringify(categories));
    }

    // Yuklash
    function loadData() {
        let p = localStorage.getItem('products');
        let s = localStorage.getItem('shops');
        let c = localStorage.getItem('categories');
        if (p) products = JSON.parse(p);
        if (s) shops = JSON.parse(s);
        if (c) categories = JSON.parse(c);
        updateCatSelect();
        showCategories();
        showProducts();
        showShops();
        updateAdminLists();
        updateCart();
    }

    // Kategoriyalarni ko'rsatish
    function showCategories() {
        let html = `<button class="cat-btn active" onclick="filterProducts('all')">🏠 Barchasi</button>`;
        categories.forEach(c => {
            html += `<button class="cat-btn" onclick="filterProducts('${c.id}')">${c.emoji} ${c.name}</button>`;
        });
        html += `<button class="cat-btn" onclick="filterProducts('discount')">🔥 Chegirmali</button>`;
        document.getElementById('categories').innerHTML = html;
    }

    function updateCatSelect() {
        let html = '';
        categories.forEach(c => html += `<option value="${c.id}">${c.emoji} ${c.name}</option>`);
        document.getElementById('prodCategory').innerHTML = html;
    }

    // Mahsulotlarni ko'rsatish
    function showProducts() {
        let filtered = products.filter(p => {
            if (currentCat === "all") return true;
            if (currentCat === "discount") return p.oldPrice && p.oldPrice > p.price;
            return p.category === currentCat;
        });
        
        let search = document.getElementById('searchInput').value.toLowerCase();
        if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
        
        let html = '';
        filtered.forEach(p => {
            let discount = '';
            if (p.oldPrice && p.oldPrice > p.price) {
                let percent = Math.round((1 - p.price/p.oldPrice)*100);
                discount = `<div style="background:red;color:white;display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;">-${percent}%</div>`;
            }
            html += `
                <div class="product-card">
                    <div class="product-img">${p.emoji}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">
                        ${formatPrice(p.price)} so'm
                        ${p.oldPrice ? `<span class="old-price">${formatPrice(p.oldPrice)} so'm</span>` : ''}
                        ${discount}
                    </div>
                    <button class="add-to-cart" onclick="addToCart(${p.id})">🛒 Savatga qo'shish</button>
                </div>
            `;
        });
        document.getElementById('products').innerHTML = html || '<p style="text-align:center">Hech narsa topilmadi</p>';
    }

    function filterProducts(cat) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        showProducts();
    }

    // Qidiruv
    document.getElementById('searchInput').addEventListener('keyup', showProducts);
    document.getElementById('shopSearchInput').addEventListener('keyup', showShops);

    // Do'konlarni ko'rsatish
    function showShops() {
        let filtered = [...shops];
        let search = document.getElementById('shopSearchInput').value.toLowerCase();
        if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search) || s.address.toLowerCase().includes(search));
        
        let html = '';
        filtered.forEach(s => {
            html += `
                <div class="shop-card" onclick="viewShop(${s.id})">
                    <div class="shop-name">🏪 ${s.name}</div>
                    <div class="shop-address">📍 ${s.address}</div>
                    <div class="shop-phone">📞 ${s.phone}</div>
                </div>
            `;
        });
        document.getElementById('shops').innerHTML = html || '<p style="text-align:center">Hech qanday do\'kon topilmadi</p>';
    }

    function viewShop(id) {
        let s = shops.find(x => x.id === id);
        if (s) alert(`🏪 ${s.name}\n📍 ${s.address}\n📞 ${s.phone}\n📝 ${s.desc || 'Ma\'lumot yo\'q'}`);
    }

    // Savat
    function addToCart(id) {
        cart[id] = (cart[id] || 0) + 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
        alert("✅ Savatga qo'shildi!");
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        let html = '';
        for (let [id, qty] of Object.entries(cart)) {
            let p = products.find(x => x.id == id);
            if (p) {
                total += p.price * qty;
                count += qty;
                html += `<div class="cart-item">
                    <div>${p.name} x${qty}</div>
                    <div>${formatPrice(p.price * qty)} so'm</div>
                </div>`;
            }
        }
        document.getElementById('cartItems').innerHTML = html || '<div>Savat bo\'sh</div>';
        document.getElementById('cartTotal').innerHTML = `Jami: ${formatPrice(total)} so'm`;
        document.getElementById('cartCount').innerHTML = count;
    }

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('open');
    }

    // Buyurtma
    function submitOrder() {
        let name = document.getElementById('fullName').value.trim();
        let address = document.getElementById('address').value.trim();
        let phone = document.getElementById('phone').value.trim();
        if (!name || !address || !phone) { alert("❌ Ma'lumotlarni to'ldiring!"); return; }
        if (Object.keys(cart).length === 0) { alert("❌ Savat bo'sh!"); return; }
        
        let items = [];
        for (let [id, qty] of Object.entries(cart)) {
            let p = products.find(x => x.id == id);
            if (p) items.push(`${p.name} x${qty}`);
        }
        let msg = `🆕 YANGI BUYURTMA!\n\n👤 ${name}\n📍 ${address}\n📞 ${phone}\n📦 ${items.join(', ')}`;
        window.open(`https://t.me/shoxi0020?text=${encodeURIComponent(msg)}`, '_blank');
        alert("✅ Buyurtma yuborildi!");
        cart = {};
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
        toggleCart();
    }

    // Admin
    function addCategory() {
        let name = document.getElementById('newCatName').value.trim();
        let emoji = document.getElementById('newCatEmoji').value.trim() || "📁";
        if (!name) { alert("❌ Kategoriya nomini yozing!"); return; }
        let id = name.toLowerCase().replace(/ /g, '_');
        categories.push({ id, name, emoji });
        saveData();
        showCategories();
        updateCatSelect();
        document.getElementById('newCatName').value = '';
        document.getElementById('newCatEmoji').value = '';
        alert("✅ Kategoriya qo'shildi!");
    }

    function addProduct() {
        let name = document.getElementById('prodName').value.trim();
        let price = parseInt(document.getElementById('prodPrice').value);
        if (!name || !price) { alert("❌ Nom va narxni yozing!"); return; }
        let newId = Math.max(...products.map(p => p.id), 0) + 1;
        products.push({
            id: newId,
            name: name,
            price: price,
            oldPrice: document.getElementById('prodOldPrice').value ? parseInt(document.getElementById('prodOldPrice').value) : null,
            category: document.getElementById('prodCategory').value,
            emoji: document.getElementById('prodEmoji').value.trim() || "📦"
        });
        saveData();
        showProducts();
        updateAdminLists();
        alert("✅ Mahsulot qo'shildi!");
    }

    function addShop() {
        let name = document.getElementById('shopName').value.trim();
        let address = document.getElementById('shopAddress').value.trim();
        let phone = document.getElementById('shopPhone').value.trim();
        if (!name || !address || !phone) { alert("❌ Do'kon ma'lumotlarini to'ldiring!"); return; }
        let newId = Math.max(...shops.map(s => s.id), 0) + 1;
        shops.push({
            id: newId,
            name: name,
            address: address,
            phone: phone,
            desc: document.getElementById('shopDesc').value.trim()
        });
        saveData();
        showShops();
        updateAdminLists();
        alert("✅ Do'kon qo'shildi!");
    }

    function deleteProduct(id) {
        if (confirm("O'chirilsinmi?")) {
            products = products.filter(p => p.id !== id);
            saveData();
            showProducts();
            updateAdminLists();
        }
    }

    function deleteShop(id) {
        if (confirm("Do'kon o'chirilsinmi?")) {
            shops = shops.filter(s => s.id !== id);
            saveData();
            showShops();
            updateAdminLists();
        }
    }

    function updateAdminLists() {
        let prodHtml = '';
        products.forEach(p => {
            prodHtml += `<div style="display:flex;justify-content:space-between;margin:8px 0">
                <span>${p.emoji} ${p.name} - ${formatPrice(p.price)} so'm</span>
                <button onclick="deleteProduct(${p.id})" style="background:red;color:white;border:none;padding:5px 10px;border-radius:8px;">🗑</button>
            </div>`;
        });
        document.getElementById('productList').innerHTML = prodHtml || 'Yo\'q';
        
        let shopHtml = '';
        shops.forEach(s => {
            shopHtml += `<div style="display:flex;justify-content:space-between;margin:8px 0">
                <span>🏪 ${s.name} - ${s.address}</span>
                <button onclick="deleteShop(${s.id})" style="background:red;color:white;border:none;padding:5px 10px;border-radius:8px;">🗑</button>
            </div>`;
        });
        document.getElementById('shopList').innerHTML = shopHtml || 'Yo\'q';
    }

    function formatPrice(p) {
        return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function showSection(section) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if (section === 'products') {
            document.querySelector('.nav-btn:first-child').classList.add('active');
            document.getElementById('productsSection').classList.remove('hidden');
            document.getElementById('shopsSection').classList.add('hidden');
            showProducts();
        } else {
            document.querySelector('.nav-btn:last-child').classList.add('active');
            document.getElementById('productsSection').classList.add('hidden');
            document.getElementById('shopsSection').classList.remove('hidden');
            showShops();
        }
    }

    function toggleAdmin() {
        let panel = document.getElementById('adminPanel');
        if (panel.style.display === 'none') {
            let pwd = prompt("Admin paroli:");
            if (pwd === "admin123") panel.style.display = 'block';
            else alert("Noto'g'ri parol!");
        } else {
            panel.style.display = 'none';
        }
    }

    // Boshlash
    loadData();
    updateCart();
</script>

</body>
</html>
