<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temurshox Mebel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: #1e3c72;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 span {
            color: #ffd700;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav-btn {
            background: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #1e3c72;
            color: white;
        }
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
        }
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .cat-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .cat-btn.active {
            background: #1e3c72;
            color: white;
        }
        .products, .shops {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card, .shop-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-img {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .product-img img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }
        .product-title, .shop-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .product-price {
            color: #1e3c72;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        .add-to-cart, .view-shop-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        .shop-address, .shop-phone {
            font-size: 0.85rem;
            margin: 5px 0;
            color: #666;
        }
        .cart-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e3c72;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 320px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        .cart-sidebar.open {
            right: 0;
        }
        .cart-header {
            background: #1e3c72;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }
        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .cart-items {
            padding: 15px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-total {
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }
        .order-form {
            padding: 15px;
        }
        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .submit-order {
            background: #28a745;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        footer {
            background: #1e3c72;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        .call-btn {
            background: #25D366;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e3c72;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            z-index: 100;
        }
        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
        }
        .admin-panel input, .admin-panel select, .admin-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .admin-panel button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-section {
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>🛋️ Temurshox <span>Mebel</span></h1>
    <p>Sifat va qulaylik uchrashgan joy</p>
</header>

<div class="container">
    <div class="nav-buttons">
        <button class="nav-btn active" id="btnProducts">🛍️ Mahsulotlar</button>
        <button class="nav-btn" id="btnShops">🏪 Do'konlar</button>
    </div>

    <div id="productsSection">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Mahsulot qidirish...">
        </div>
        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <div id="shopsSection" class="hidden">
        <div class="search-box">
            <input type="text" id="shopSearchInput" placeholder="Do'kon qidirish...">
        </div>
        <div class="shops" id="shops"></div>
    </div>

    <div class="admin-panel" id="adminPanel" style="display: none;">
        <h3>🔧 Admin Panel</h3>
        
        <div class="admin-section">
            <h4>Yangi kategoriya</h4>
            <input type="text" id="catName" placeholder="Kategoriya nomi">
            <input type="text" id="catEmoji" placeholder="Emoji (🛋️)">
            <button onclick="addCategory()">Kategoriya qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>Yangi mahsulot</h4>
            <input type="text" id="prodName" placeholder="Mahsulot nomi">
            <input type="number" id="prodPrice" placeholder="Narxi">
            <input type="number" id="prodOldPrice" placeholder="Eski narxi">
            <select id="prodCategory"></select>
            <input type="text" id="prodEmoji" placeholder="Emoji">
            <button onclick="addProduct()">Mahsulot qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>Yangi do'kon</h4>
            <input type="text" id="shopName" placeholder="Do'kon nomi">
            <input type="text" id="shopAddress" placeholder="Manzil">
            <input type="text" id="shopPhone" placeholder="Telefon">
            <textarea id="shopDesc" rows="2" placeholder="Tavsif"></textarea>
            <button onclick="addShop()">Do'kon qo'shish</button>
        </div>

        <div class="admin-section">
            <h4>Mahsulotlar ro'yxati</h4>
            <div id="productList"></div>
        </div>

        <div class="admin-section">
            <h4>Do'konlar ro'yxati</h4>
            <div id="shopList"></div>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Temurshox Mebel</p>
    <a href="tel:+998941281315" class="call-btn">📞 +998 94 128 13 15</a>
</footer>

<div class="cart-toggle" id="cartToggle">
    🛒
    <span class="cart-count" id="cartCount">0</span>
</div>

<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3>Savatcha</h3>
        <button class="close-cart" id="closeCart">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Jami: 0 so'm</div>
    <div class="order-form">
        <input type="text" id="fullName" placeholder="Ism Familiya">
        <textarea id="address" rows="2" placeholder="Manzil"></textarea>
        <input type="tel" id="phone" placeholder="Telefon">
        <textarea id="notes" rows="2" placeholder="Izoh"></textarea>
        <button class="submit-order" id="submitOrder">Buyurtma berish</button>
    </div>
</div>

<button class="admin-toggle" id="adminToggle">🔧</button>

<script>
    // MA'LUMOTLAR
    let categories = [
        { id: "divan", name: "Divanlar", emoji: "🛋️" },
        { id: "stol", name: "Stollar", emoji: "💻" },
        { id: "shkaf", name: "Shkaflar", emoji: "🚪" },
        { id: "kreslo", name: "Kreslolar", emoji: "🪑" }
    ];

    let products = [
        { id: 1, name: "Angliya divani", price: 3200000, oldPrice: 3800000, category: "divan", emoji: "🛋️" },
        { id: 2, name: "Luks divan", price: 4500000, oldPrice: 5200000, category: "divan", emoji: "🪑" },
        { id: 3, name: "Kompyuter stoli", price: 850000, oldPrice: null, category: "stol", emoji: "💻" },
        { id: 4, name: "Garderob shkafi", price: 2800000, oldPrice: 3200000, category: "shkaf", emoji: "🚪" },
        { id: 5, name: "Kompyuter kreslosi", price: 1100000, oldPrice: null, category: "kreslo", emoji: "🪑" }
    ];

    let shops = [
        { id: 1, name: "Chilonzor filiali", address: "Chilonzor tumani, 3-kvartal", phone: "+998 97 935 13 15", desc: "Markaziy filial" },
        { id: 2, name: "Sergeli filiali", address: "Sergeli tumani, Yangi hayot", phone: "+998 93 346 86 32", desc: "Yangi filial" }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || {};
    let currentSection = "products";
    let currentCat = "all";

    // SAQLASH
    function saveData() {
        localStorage.setItem('products', JSON.stringify(products));
        localStorage.setItem('shops', JSON.stringify(shops));
        localStorage.setItem('categories', JSON.stringify(categories));
    }

    function loadData() {
        let p = localStorage.getItem('products');
        let s = localStorage.getItem('shops');
        let c = localStorage.getItem('categories');
        if (p) products = JSON.parse(p);
        if (s) shops = JSON.parse(s);
        if (c) categories = JSON.parse(c);
        updateCategorySelect();
        showCategories();
        showProducts();
        showShops();
        updateAdminLists();
        updateCart();
    }

    // KO'RINISH
    document.getElementById('btnProducts').onclick = function() {
        currentSection = "products";
        document.getElementById('btnProducts').classList.add('active');
        document.getElementById('btnShops').classList.remove('active');
        document.getElementById('productsSection').classList.remove('hidden');
        document.getElementById('shopsSection').classList.add('hidden');
        showProducts();
    };

    document.getElementById('btnShops').onclick = function() {
        currentSection = "shops";
        document.getElementById('btnShops').classList.add('active');
        document.getElementById('btnProducts').classList.remove('active');
        document.getElementById('productsSection').classList.add('hidden');
        document.getElementById('shopsSection').classList.remove('hidden');
        showShops();
    };

    // KATEGORIYALAR
    function showCategories() {
        let html = '<button class="cat-btn active" data-cat="all" onclick="filterProducts(\'all\')">🏠 Barchasi</button>';
        for (let i = 0; i < categories.length; i++) {
            html += '<button class="cat-btn" data-cat="' + categories[i].id + '" onclick="filterProducts(\'' + categories[i].id + '\')">' + categories[i].emoji + ' ' + categories[i].name + '</button>';
        }
        html += '<button class="cat-btn" data-cat="discount" onclick="filterProducts(\'discount\')">🔥 Chegirmali</button>';
        document.getElementById('categories').innerHTML = html;
    }

    function updateCategorySelect() {
        let html = '';
        for (let i = 0; i < categories.length; i++) {
            html += '<option value="' + categories[i].id + '">' + categories[i].emoji + ' ' + categories[i].name + '</option>';
        }
        document.getElementById('prodCategory').innerHTML = html;
    }

    function addCategory() {
        let name = document.getElementById('catName').value.trim();
        let emoji = document.getElementById('catEmoji').value.trim() || "📁";
        if (!name) { alert("Kategoriya nomini yozing!"); return; }
        let id = name.toLowerCase().replace(/ /g, '_');
        categories.push({ id: id, name: name, emoji: emoji });
        saveData();
        showCategories();
        updateCategorySelect();
        document.getElementById('catName').value = '';
        document.getElementById('catEmoji').value = '';
        alert("Kategoriya qo'shildi!");
    }

    // MAHSULOTLAR
    function showProducts() {
        let filtered = [];
        for (let i = 0; i < products.length; i++) {
            let p = products[i];
            let ok = false;
            if (currentCat === "all") ok = true;
            else if (currentCat === "discount") ok = (p.oldPrice && p.oldPrice > p.price);
            else ok = (p.category === currentCat);
            if (ok) filtered.push(p);
        }
        
        let search = document.getElementById('searchInput').value.toLowerCase();
        if (search) {
            let filtered2 = [];
            for (let i = 0; i < filtered.length; i++) {
                if (filtered[i].name.toLowerCase().includes(search)) filtered2.push(filtered[i]);
            }
            filtered = filtered2;
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            let p = filtered[i];
            let discountHtml = '';
            if (p.oldPrice && p.oldPrice > p.price) {
                let percent = Math.round((1 - p.price / p.oldPrice) * 100);
                discountHtml = '<div style="background:red;color:white;display:inline-block;padding:2px 8px;border-radius:20px;font-size:12px;">-' + percent + '%</div>';
            }
            html += '<div class="product-card">' +
                '<div class="product-img">' + p.emoji + '</div>' +
                '<div class="product-title">' + p.name + '</div>' +
                '<div class="product-price">' + formatPrice(p.price) + ' so\'m' +
                (p.oldPrice ? '<span class="old-price">' + formatPrice(p.oldPrice) + ' so\'m</span>' : '') +
                '</div>' +
                discountHtml +
                '<button class="add-to-cart" onclick="addToCart(' + p.id + ')">🛒 Savatga qo\'shish</button>' +
                '</div>';
        }
        document.getElementById('products').innerHTML = html || '<p style="text-align:center">Hech narsa topilmadi</p>';
    }

    function filterProducts(cat) {
        currentCat = cat;
        let btns = document.querySelectorAll('.cat-btn');
        for (let i = 0; i < btns.length; i++) {
            btns[i].classList.remove('active');
            if (btns[i].getAttribute('data-cat') === cat) btns[i].classList.add('active');
        }
        showProducts();
    }

    document.getElementById('searchInput').onkeyup = function() { showProducts(); };

    function addProduct() {
        let name = document.getElementById('prodName').value.trim();
        let price = parseInt(document.getElementById('prodPrice').value);
        if (!name || !price) { alert("Nom va narxni yozing!"); return; }
        
        let newId = 1;
        for (let i = 0; i < products.length; i++) if (products[i].id >= newId) newId = products[i].id + 1;
        
        let oldPrice = document.getElementById('prodOldPrice').value;
        let oldPriceVal = (oldPrice && parseInt(oldPrice)) ? parseInt(oldPrice) : null;
        
        products.push({
            id: newId,
            name: name,
            price: price,
            oldPrice: oldPriceVal,
            category: document.getElementById('prodCategory').value,
            emoji: document.getElementById('prodEmoji').value.trim() || "📦"
        });
        saveData();
        showProducts();
        updateAdminLists();
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodOldPrice').value = '';
        document.getElementById('prodEmoji').value = '';
        alert("Mahsulot qo'shildi!");
    }

    function deleteProduct(id) {
        if (confirm("O'chirilsinmi?")) {
            let newProducts = [];
            for (let i = 0; i < products.length; i++) if (products[i].id !== id) newProducts.push(products[i]);
            products = newProducts;
            saveData();
            showProducts();
            updateAdminLists();
        }
    }

    // DO'KONLAR
    function showShops() {
        let filtered = [];
        for (let i = 0; i < shops.length; i++) filtered.push(shops[i]);
        
        let search = document.getElementById('shopSearchInput').value.toLowerCase();
        if (search) {
            let filtered2 = [];
            for (let i = 0; i < filtered.length; i++) {
                if (filtered[i].name.toLowerCase().includes(search) || filtered[i].address.toLowerCase().includes(search)) filtered2.push(filtered[i]);
            }
            filtered = filtered2;
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            let s = filtered[i];
            html += '<div class="shop-card">' +
                '<div class="product-img">🏪</div>' +
                '<div class="shop-name">' + s.name + '</div>' +
                '<div class="shop-address">📍 ' + s.address + '</div>' +
                '<div class="shop-phone">📞 ' + s.phone + '</div>' +
                '<button class="view-shop-btn" onclick="viewShop(' + s.id + ')">🔍 Batafsil</button>' +
                '</div>';
        }
        document.getElementById('shops').innerHTML = html || '<p style="text-align:center">Hech qanday do\'kon topilmadi</p>';
    }

    document.getElementById('shopSearchInput').onkeyup = function() { showShops(); };

    function viewShop(id) {
        for (let i = 0; i < shops.length; i++) {
            if (shops[i].id === id) {
                alert("🏪 " + shops[i].name + "\n\n📍 " + shops[i].address + "\n📞 " + shops[i].phone + "\n📝 " + (shops[i].desc || 'Ma\'lumot yo\'q'));
                return;
            }
        }
    }

    function addShop() {
        let name = document.getElementById('shopName').value.trim();
        let address = document.getElementById('shopAddress').value.trim();
        let phone = document.getElementById('shopPhone').value.trim();
        if (!name || !address || !phone) { alert("Do'kon nomi, manzil va telefonni yozing!"); return; }
        
        let newId = 1;
        for (let i = 0; i < shops.length; i++) if (shops[i].id >= newId) newId = shops[i].id + 1;
        
        shops.push({
            id: newId,
            name: name,
            address: address,
            phone: phone,
            desc: document.getElementById('shopDesc').value.trim()
        });
        saveData();
        showShops();
        updateAdminLists();
        
        document.getElementById('shopName').value = '';
        document.getElementById('shopAddress').value = '';
        document.getElementById('shopPhone').value = '';
        document.getElementById('shopDesc').value = '';
        alert("Do'kon qo'shildi!");
    }

    function deleteShop(id) {
        if (confirm("Do'kon o'chirilsinmi?")) {
            let newShops = [];
            for (let i = 0; i < shops.length; i++) if (shops[i].id !== id) newShops.push(shops[i]);
            shops = newShops;
            saveData();
            showShops();
            updateAdminLists();
        }
    }

    // SAVAT
    function addToCart(id) {
        if (cart[id]) cart[id] = cart[id] + 1;
        else cart[id] = 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
        alert("Savatga qo'shildi!");
    }

    function updateCart() {
        let total = 0;
        let count = 0;
        let html = '';
        for (let id in cart) {
            for (let i = 0; i < products.length; i++) {
                if (products[i].id == id) {
                    let subtotal = products[i].price * cart[id];
                    total += subtotal;
                    count += cart[id];
                    html += '<div class="cart-item"><div><strong>' + products[i].name + '</strong> x' + cart[id] + '</div><div>' + formatPrice(subtotal) + ' so\'m</div></div>';
                    break;
                }
            }
        }
        document.getElementById('cartItems').innerHTML = html || '<div style="text-align:center">Savat bo\'sh</div>';
        document.getElementById('cartTotal').innerHTML = 'Jami: ' + formatPrice(total) + ' so\'m';
        document.getElementById('cartCount').innerHTML = count;
    }

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('open');
    }

    document.getElementById('cartToggle').onclick = toggleCart;
    document.getElementById('closeCart').onclick = toggleCart;

    // BUYURTMA
    document.getElementById('submitOrder').onclick = function() {
        let name = document.getElementById('fullName').value.trim();
        let address = document.getElementById('address').value.trim();
        let phone = document.getElementById('phone').value.trim();
        if (!name || !address || !phone) { alert("Ma'lumotlarni to'ldiring!"); return; }
        
        let empty = true;
        for (let i in cart) { empty = false; break; }
        if (empty) { alert("Savat bo'sh!"); return; }
        
        let items = [];
        let total = 0;
        for (let id in cart) {
            for (let i = 0; i < products.length; i++) {
                if (products[i].id == id) {
                    let subtotal = products[i].price * cart[id];
                    total += subtotal;
                    items.push(products[i].name + ' x' + cart[id] + ' = ' + formatPrice(subtotal) + ' so\'m');
                    break;
                }
            }
        }
        
        let notes = document.getElementById('notes').value.trim();
        let msg = "🆕 YANGI BUYURTMA!\n\n👤 Mijoz: " + name + "\n📍 Manzil: " + address + "\n📞 Telefon: " + phone;
        if (notes) msg += "\n📝 Izoh: " + notes;
        msg += "\n\n📦 Mahsulotlar:\n" + items.join('\n') + "\n\n💰 Jami: " + formatPrice(total) + " so'm";
        
        window.open('https://t.me/shoxi0020?text=' + encodeURIComponent(msg), '_blank');
        alert("Buyurtma yuborildi!");
        
        cart = {};
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCart();
        toggleCart();
        document.getElementById('fullName').value = '';
        document.getElementById('address').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('notes').value = '';
    };

    // ADMIN
    function updateAdminLists() {
        let prodHtml = '';
        for (let i = 0; i < products.length; i++) {
            prodHtml += '<div style="display:flex;justify-content:space-between;margin:8px 0;"><span>' + products[i].emoji + ' ' + products[i].name + ' - ' + formatPrice(products[i].price) + ' so\'m</span><button onclick="deleteProduct(' + products[i].id + ')" style="background:red;color:white;border:none;padding:5px 10px;border-radius:8px;">🗑</button></div>';
        }
        document.getElementById('productList').innerHTML = prodHtml || 'Yo\'q';
        
        let shopHtml = '';
        for (let i = 0; i < shops.length; i++) {
            shopHtml += '<div style="display:flex;justify-content:space-between;margin:8px 0;"><span>🏪 ' + shops[i].name + ' - ' + shops[i].address + '</span><button onclick="deleteShop(' + shops[i].id + ')" style="background:red;color:white;border:none;padding:5px 10px;border-radius:8px;">🗑</button></div>';
        }
        document.getElementById('shopList').innerHTML = shopHtml || 'Yo\'q';
    }

    function formatPrice(p) {
        return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    let adminPassword = "admin123";
    document.getElementById('adminToggle').onclick = function() {
        let panel = document.getElementById('adminPanel');
        if (panel.style.display === 'none') {
            let pwd = prompt("Admin parolini kiriting:");
            if (pwd === adminPassword) panel.style.display = 'block';
            else alert("Noto'g'ri parol!");
        } else {
            panel.style.display = 'none';
        }
    };

    // BOSHLASH
    loadData();
    updateCart();
</script>
